<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Dyno / sound-test certificate frame</title>
  <desc id="desc">Certificate asset for Oak Flats Muffler Men. Uses the approved Mufflermen logo from /media/brand/mufflermen-logo-icon-512.webp.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050508"/>
      <stop offset="58%" stop-color="#11141b"/>
      <stop offset="100%" stop-color="#210d10"/>
    </linearGradient>
    <linearGradient id="redline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e62028"/>
      <stop offset="48%" stop-color="#ffc14f"/>
      <stop offset="100%" stop-color="#40bcff"/>
    </linearGradient>
    <radialGradient id="glow" cx="78%" cy="12%" r="68%">
      <stop offset="0%" stop-color="#e62028" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#e62028" stop-opacity="0"/>
    </radialGradient>
    <pattern id="carbon" width="24" height="24" patternUnits="userSpaceOnUse" patternTransform="rotate(35)">
      <rect width="24" height="24" fill="none"/>
      <path d="M0 12H24" stroke="#ffffff" stroke-opacity="0.055" stroke-width="3"/>
    </pattern>
    <clipPath id="mediaClip">
      <rect x="896" y="63" width="608" height="306" rx="28"/>
    </clipPath>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#carbon)" opacity="0.54"/>
  <rect width="1600" height="900" fill="url(#glow)"/>
  <rect x="48" y="32" width="1504" height="837" rx="34" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>
  <rect x="48" y="32" width="1504" height="10" rx="5" fill="url(#redline)"/>

  <image href="../mufflermen-logo-icon-512.webp" x="96" y="63" width="520" height="220" preserveAspectRatio="xMidYMid meet"/>
  <g clip-path="url(#mediaClip)">
    <image href="../../generated/featured-hsv-gts-twin-system.webp" x="896" y="63" width="608" height="306" preserveAspectRatio="xMidYMid slice" opacity="0.9"/>
    <rect x="896" y="63" width="608" height="306" fill="url(#redline)" opacity="0.14"/>
  </g>

  <text x="96" y="387" fill="#ffc14f" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="22" letter-spacing="5">CERTIFICATE</text>
  <rect x="96" y="423" width="1408" height="342" rx="30" fill="#ffffff" fill-opacity="0.055" stroke="#ffffff" stroke-opacity="0.13"/>
  <text x="138" y="505" fill="#f8fafc" font-family="'Bahnschrift Condensed','Arial Narrow',Arial,sans-serif" font-weight="900" font-size="64" letter-spacing="1">DYNO / SOUND-TEST CERTIFICATE FRAME</text>
  <text x="138" y="567" fill="#c7c9d0" font-family="Arial, Helvetica, sans-serif" font-size="30">
    <tspan x="138" dy="0">Wrap sound-test or dyno proof screenshots before publishing.</tspan>
    <tspan x="138" dy="44">Uses the Mufflermen icon as a certificate seal plus full contact strip.</tspan>
  </text>
  <g transform="translate(138 673)">
    <rect x="0" y="0" width="96" height="42" rx="21" fill="#e62028" fill-opacity="0.92" stroke="#ffffff" stroke-opacity="0.14"/><text x="48" y="27" text-anchor="middle" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="16">320</text><rect x="118" y="0" width="96" height="42" rx="21" fill="#e62028" fill-opacity="0.20" stroke="#ffffff" stroke-opacity="0.14"/><text x="166" y="27" text-anchor="middle" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="16">390</text><rect x="236" y="0" width="96" height="42" rx="21" fill="#e62028" fill-opacity="0.20" stroke="#ffffff" stroke-opacity="0.14"/><text x="284" y="27" text-anchor="middle" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="16">768</text><rect x="354" y="0" width="96" height="42" rx="21" fill="#e62028" fill-opacity="0.20" stroke="#ffffff" stroke-opacity="0.14"/><text x="402" y="27" text-anchor="middle" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="16">1280</text><rect x="472" y="0" width="96" height="42" rx="21" fill="#e62028" fill-opacity="0.20" stroke="#ffffff" stroke-opacity="0.14"/><text x="520" y="27" text-anchor="middle" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="16">1920</text>
  </g>
  <text x="96" y="828" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="23">02 4256 3740 • info@oakflatsmufflermen.com.au</text>
  <text x="1504" y="828" text-anchor="end" fill="#40bcff" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="20">Unit 2/8 Shaban St, Albion Park Rail NSW 2527</text>
</svg>
