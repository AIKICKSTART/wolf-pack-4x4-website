<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080" role="img" aria-labelledby="title desc">
  <title id="title">Hat patch mark</title>
  <desc id="desc">Patch asset for Oak Flats Muffler Men. Uses the approved Mufflermen logo from /media/brand/mufflermen-logo-icon-512.webp.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050508"/>
      <stop offset="58%" stop-color="#11141b"/>
      <stop offset="100%" stop-color="#210d10"/>
    </linearGradient>
    <linearGradient id="redline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e62028"/>
      <stop offset="48%" stop-color="#ffc14f"/>
      <stop offset="100%" stop-color="#40bcff"/>
    </linearGradient>
    <radialGradient id="glow" cx="78%" cy="12%" r="68%">
      <stop offset="0%" stop-color="#e62028" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#e62028" stop-opacity="0"/>
    </radialGradient>
    <pattern id="carbon" width="24" height="24" patternUnits="userSpaceOnUse" patternTransform="rotate(35)">
      <rect width="24" height="24" fill="none"/>
      <path d="M0 12H24" stroke="#ffffff" stroke-opacity="0.055" stroke-width="3"/>
    </pattern>
    <clipPath id="mediaClip">
      <rect x="605" y="76" width="410" height="367" rx="28"/>
    </clipPath>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect width="1080" height="1080" fill="url(#carbon)" opacity="0.54"/>
  <rect width="1080" height="1080" fill="url(#glow)"/>
  <rect x="32" y="38" width="1015" height="1004" rx="34" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>
  <rect x="32" y="38" width="1015" height="10" rx="5" fill="url(#redline)"/>

  <image href="../mufflermen-logo-icon-512.webp" x="65" y="76" width="360" height="360" preserveAspectRatio="xMidYMid meet"/>
  <g clip-path="url(#mediaClip)">
    <image href="../../generated/featured-hsv-gts-twin-system.webp" x="605" y="76" width="410" height="367" preserveAspectRatio="xMidYMid slice" opacity="0.9"/>
    <rect x="605" y="76" width="410" height="367" fill="url(#redline)" opacity="0.14"/>
  </g>

  <text x="65" y="465" fill="#ffc14f" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="22" letter-spacing="5">PATCH</text>
  <rect x="65" y="508" width="950" height="410" rx="30" fill="#ffffff" fill-opacity="0.055" stroke="#ffffff" stroke-opacity="0.13"/>
  <text x="107" y="606" fill="#f8fafc" font-family="'Bahnschrift Condensed','Arial Narrow',Arial,sans-serif" font-weight="900" font-size="64" letter-spacing="1">HAT PATCH MARK</text>
  <text x="107" y="680" fill="#c7c9d0" font-family="Arial, Helvetica, sans-serif" font-size="30">
    <tspan x="107" dy="0">Use for embroidered caps, patch proofs, and small-format merch.</tspan>
    <tspan x="107" dy="44">Icon logo is the source mark so thread detail stays readable.</tspan>
  </text>
