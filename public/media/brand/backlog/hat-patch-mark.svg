  </g>
  <text x="65" y="994" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="23">02 4256 3740 • info@oakflatsmufflermen.com.au</text>
  <text x="1015" y="994" text-anchor="end" fill="#40bcff" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="20">Unit 2/8 Shaban St, Albion Park Rail NSW 2527</text>
