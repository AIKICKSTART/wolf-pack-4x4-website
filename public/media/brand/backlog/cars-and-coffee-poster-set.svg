<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920" role="img" aria-labelledby="title desc">
  <title id="title">Cars-and-coffee poster set</title>
  <desc id="desc">Community poster asset for Oak Flats Muffler Men. Uses the approved Mufflermen logo from /media/brand/mufflermen-logo-primary.webp.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050508"/>
      <stop offset="58%" stop-color="#11141b"/>
      <stop offset="100%" stop-color="#210d10"/>
    </linearGradient>
    <linearGradient id="redline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e62028"/>
      <stop offset="48%" stop-color="#ffc14f"/>
      <stop offset="100%" stop-color="#40bcff"/>
    </linearGradient>
    <radialGradient id="glow" cx="78%" cy="12%" r="68%">
      <stop offset="0%" stop-color="#e62028" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#e62028" stop-opacity="0"/>
    </radialGradient>
    <pattern id="carbon" width="24" height="24" patternUnits="userSpaceOnUse" patternTransform="rotate(35)">
      <rect width="24" height="24" fill="none"/>
      <path d="M0 12H24" stroke="#ffffff" stroke-opacity="0.055" stroke-width="3"/>
    </pattern>
    <clipPath id="mediaClip">
      <rect x="605" y="134" width="410" height="653" rx="28"/>
    </clipPath>
  </defs>
  <rect width="1080" height="1920" fill="url(#bg)"/>
  <rect width="1080" height="1920" fill="url(#carbon)" opacity="0.54"/>
  <rect width="1080" height="1920" fill="url(#glow)"/>
  <rect x="32" y="67" width="1015" height="1786" rx="34" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>
  <rect x="32" y="67" width="1015" height="10" rx="5" fill="url(#redline)"/>

  <image href="../mufflermen-logo-primary.webp" x="65" y="134" width="640" height="280" preserveAspectRatio="xMidYMid meet"/>
  <g clip-path="url(#mediaClip)">
    <image href="../../generated/australian-performance-triptych.webp" x="605" y="134" width="410" height="653" preserveAspectRatio="xMidYMid slice" opacity="0.9"/>
    <rect x="605" y="134" width="410" height="653" fill="url(#redline)" opacity="0.14"/>
  </g>

  <text x="65" y="825" fill="#ffc14f" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="26" letter-spacing="5">COMMUNITY POSTER</text>
  <rect x="65" y="902" width="950" height="730" rx="30" fill="#ffffff" fill-opacity="0.055" stroke="#ffffff" stroke-opacity="0.13"/>
  <text x="107" y="1077" fill="#f8fafc" font-family="'Bahnschrift Condensed','Arial Narrow',Arial,sans-serif" font-weight="900" font-size="72" letter-spacing="1">CARS-AND-COFFEE POSTER SET</text>
  <text x="107" y="1209" fill="#c7c9d0" font-family="Arial, Helvetica, sans-serif" font-size="36">
    <tspan x="107" dy="0">Use for local meetups, club posts, and performance-community sponsorships.</tspan>
    <tspan x="107" dy="52">Primary lockup, workshop address, and event details are in the same template.</tspan>
  </text>
  <g transform="translate(107 1435)">
    <rect x="0" y="0" width="96" height="42" rx="21" fill="#e62028" fill-opacity="0.92" stroke="#ffffff" stroke-opacity="0.14"/><text x="48" y="27" text-anchor="middle" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="16">320</text><rect x="118" y="0" width="96" height="42" rx="21" fill="#e62028" fill-opacity="0.20" stroke="#ffffff" stroke-opacity="0.14"/><text x="166" y="27" text-anchor="middle" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="16">390</text><rect x="236" y="0" width="96" height="42" rx="21" fill="#e62028" fill-opacity="0.20" stroke="#ffffff" stroke-opacity="0.14"/><text x="284" y="27" text-anchor="middle" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="16">768</text><rect x="354" y="0" width="96" height="42" rx="21" fill="#e62028" fill-opacity="0.20" stroke="#ffffff" stroke-opacity="0.14"/><text x="402" y="27" text-anchor="middle" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="16">1280</text><rect x="472" y="0" width="96" height="42" rx="21" fill="#e62028" fill-opacity="0.20" stroke="#ffffff" stroke-opacity="0.14"/><text x="520" y="27" text-anchor="middle" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="16">1920</text>
  </g>
  <text x="65" y="1766" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="27">02 4256 3740 • info@oakflatsmufflermen.com.au</text>
  <text x="1015" y="1766" text-anchor="end" fill="#40bcff" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="24">Unit 2/8 Shaban St, Albion Park Rail NSW 2527</text>
</svg>
