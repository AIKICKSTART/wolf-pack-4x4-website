<svg xmlns="http://www.w3.org/2000/svg" width="210mm" height="297mm" viewBox="0 0 2100 2970" role="img" aria-labelledby="title desc">
  <title id="title">Oak Flats Muffler Men A4 letterhead</title>
  <desc id="desc">A4 print letterhead with branded top band, footer details, and a low-opacity watermark mark.</desc>
  <defs>
    <linearGradient id="headerBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#05070b"/>
      <stop offset="46%" stop-color="#10161d"/>
      <stop offset="100%" stop-color="#0c141a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e62028"/>
      <stop offset="50%" stop-color="#ffc14f"/>
      <stop offset="100%" stop-color="#40bcff"/>
    </linearGradient>
  </defs>

  <rect width="2100" height="2970" fill="#f7f8fb"/>
  <rect x="0" y="0" width="2100" height="286" fill="url(#headerBg)"/>
  <rect x="0" y="0" width="2100" height="18" fill="url(#accent)"/>
  <image href="/media/brand/mufflermen-logo-primary.webp" x="120" y="78" width="480" height="140" preserveAspectRatio="xMinYMid meet"/>

  <g transform="translate(1308 78)">
    <text x="0" y="30" fill="#40bcff" font-size="24" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" letter-spacing="3" font-weight="700">WORKSHOP LETTERHEAD</text>
    <text x="0" y="82" fill="#ffffff" font-size="36" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700">Oak Flats Muffler Men</text>
    <text x="0" y="122" fill="#d7e0ea" font-size="22" font-family="Arial,sans-serif">Unit 2/8 Shaban St, Albion Park Rail NSW 2527</text>
    <text x="0" y="156" fill="#ffc14f" font-size="24" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700">02 4256 3740   |   0411 844 062</text>
    <text x="0" y="190" fill="#d7e0ea" font-size="22" font-family="Arial,sans-serif">info@oakflatsmufflermen.com.au   |   mufflermen.com.au</text>
  </g>

  <g opacity="0.08">
    <image href="/media/brand/mufflermen-logo-icon-512.webp" x="1210" y="1140" width="650" height="650" preserveAspectRatio="xMidYMid meet"/>
  </g>

  <line x1="140" y1="386" x2="1960" y2="386" stroke="#d6dde6" stroke-width="2"/>
  <line x1="140" y1="2444" x2="1960" y2="2444" stroke="#d6dde6" stroke-width="2" stroke-dasharray="12 10"/>
  <text x="140" y="2488" fill="#617286" font-size="22" font-family="Arial,sans-serif">Recommended content area starts here for quotes, invoices, or workshop proposals.</text>

  <rect x="0" y="2832" width="2100" height="138" fill="#0b1016"/>
  <rect x="0" y="2832" width="2100" height="8" fill="url(#accent)"/>
  <text x="120" y="2908" fill="#f7fafc" font-size="24" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" letter-spacing="2" font-weight="700">EXHAUST  |  PERFORMANCE  |  FABRICATION</text>
  <text x="1980" y="2908" text-anchor="end" fill="#d7e0ea" font-size="22" font-family="Arial,sans-serif">mufflermen.com.au</text>
</svg>
