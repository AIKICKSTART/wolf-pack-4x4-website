<svg xmlns="http://www.w3.org/2000/svg" width="96mm" height="61mm" viewBox="0 0 960 610" role="img" aria-labelledby="title desc">
  <title id="title">Oak Flats Muffler Men business card back</title>
  <desc id="desc">Print-ready back business card with service list, booking call to action, and website panel.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#090b10"/>
      <stop offset="64%" stop-color="#14181f"/>
      <stop offset="100%" stop-color="#1d110a"/>
    </linearGradient>
    <radialGradient id="glow" cx="6%" cy="88%" r="72%">
      <stop offset="0%" stop-color="#ffc14f" stop-opacity="0.36"/>
      <stop offset="100%" stop-color="#ffc14f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffc14f"/>
      <stop offset="100%" stop-color="#40bcff"/>
    </linearGradient>
  </defs>

  <rect width="960" height="610" fill="url(#bg)"/>
  <rect width="960" height="610" fill="url(#glow)"/>
  <rect x="42" y="42" width="876" height="526" rx="28" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>

  <g transform="translate(86 82)">
    <text x="0" y="0" dy="22" fill="#ffc14f" font-size="18" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" letter-spacing="2.8" font-weight="700">BOOK THE SOUND YOU ACTUALLY WANT</text>
    <text x="0" y="72" fill="#f7fafc" font-size="62" font-family="'Bahnschrift Condensed','Arial Narrow',Arial,sans-serif" font-weight="700">CUSTOM SYSTEMS</text>
    <text x="0" y="128" fill="#f7fafc" font-size="62" font-family="'Bahnschrift Condensed','Arial Narrow',Arial,sans-serif" font-weight="700">REPAIRS</text>
    <text x="0" y="184" fill="#f7fafc" font-size="62" font-family="'Bahnschrift Condensed','Arial Narrow',Arial,sans-serif" font-weight="700">PERFORMANCE FITMENT</text>

    <g fill="#dbe4ee" font-size="23" font-family="Arial,sans-serif">
      <text x="0" y="262">Custom exhausts and sports systems</text>
      <text x="0" y="302">Mufflers, tips, and pipework</text>
      <text x="0" y="342">4x4, ute, and tow-vehicle exhausts</text>
      <text x="0" y="382">TIG welding and fabrication</text>
      <text x="0" y="422">Quote reviews and sound upgrade consults</text>
    </g>
  </g>

  <g transform="translate(660 88)">
