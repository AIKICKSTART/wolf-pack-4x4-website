    <rect x="28" y="28" width="158" height="158" rx="18" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.18" stroke-width="3"/>
    <text x="107" y="100" text-anchor="middle" fill="#f7fafc" font-size="28" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700">BOOK</text>
    <text x="107" y="136" text-anchor="middle" fill="#ffc14f" font-size="20" font-family="Arial,sans-serif">MUFFLERMEN</text>
    <text x="107" y="166" text-anchor="middle" fill="#dbe4ee" font-size="17" font-family="Arial,sans-serif">.COM.AU</text>
    <text x="107" y="246" text-anchor="middle" fill="#dbe4ee" font-size="16" font-family="Arial,sans-serif">Call or use the website</text>
  </g>

  <g transform="translate(628 342)">
    <rect x="0" y="0" width="262" height="180" rx="24" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="24" y="40" fill="#40bcff" font-size="16" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" letter-spacing="2.1" font-weight="700">CALL OR EMAIL</text>
    <text x="24" y="84" fill="#f7fafc" font-size="30" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700">02 4256 3740</text>
    <text x="24" y="118" fill="#dbe4ee" font-size="20" font-family="Arial,sans-serif">0411 844 062</text>
    <text x="24" y="148" fill="#dbe4ee" font-size="18" font-family="Arial,sans-serif">info@oakflatsmufflermen.com.au</text>
    <text x="24" y="172" fill="#ffc14f" font-size="18" font-family="Arial,sans-serif">mufflermen.com.au</text>
  </g>
