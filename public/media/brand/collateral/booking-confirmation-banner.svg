<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="520" viewBox="0 0 1600 520" role="img" aria-labelledby="title desc">
  <title id="title">Oak Flats Muffler Men booking confirmation banner</title>
  <desc id="desc">CRM booking confirmation banner with workshop branding, appointment placeholders, and call to action details.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05070b"/>
      <stop offset="56%" stop-color="#10161d"/>
      <stop offset="100%" stop-color="#120c11"/>
    </linearGradient>
    <radialGradient id="glow" cx="92%" cy="8%" r="64%">
      <stop offset="0%" stop-color="#40bcff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#40bcff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e62028"/>
      <stop offset="54%" stop-color="#ffc14f"/>
      <stop offset="100%" stop-color="#40bcff"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="520" fill="url(#bg)"/>
  <rect width="1600" height="520" fill="url(#glow)"/>
  <rect x="58" y="50" width="1484" height="420" rx="30" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
  <rect x="58" y="50" width="1484" height="10" rx="5" fill="url(#accent)"/>

  <image href="/media/brand/mufflermen-logo-nav.webp" x="96" y="96" width="344" height="104" preserveAspectRatio="xMinYMid meet"/>

  <text x="98" y="250" fill="#40bcff" font-size="18" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" letter-spacing="3" font-weight="700">BOOKING CONFIRMED</text>
  <text x="96" y="318" fill="#f7fafc" font-size="86" font-family="'Bahnschrift Condensed','Arial Narrow',Arial,sans-serif" font-weight="700">YOU ARE BOOKED IN</text>
  <text x="98" y="374" fill="#d7e0ea" font-size="28" font-family="Arial,sans-serif">Use this banner in confirmation emails, CRM journeys, and workshop intake updates.</text>

  <g transform="translate(96 408)">
    <rect x="0" y="0" width="234" height="44" rx="22" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.14)"/>
    <text x="117" y="28" text-anchor="middle" fill="#ffc14f" font-size="15" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="2">CUSTOM EXHAUST</text>
  </g>
  <g transform="translate(348 408)">
    <rect x="0" y="0" width="208" height="44" rx="22" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.14)"/>
    <text x="104" y="28" text-anchor="middle" fill="#40bcff" font-size="15" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="2">4X4 FITMENT</text>
  </g>
  <g transform="translate(574 408)">
    <rect x="0" y="0" width="178" height="44" rx="22" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.14)"/>
    <text x="89" y="28" text-anchor="middle" fill="#ffffff" font-size="15" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="2">TIG FAB</text>
  </g>

  <g transform="translate(918 100)">
    <rect x="0" y="0" width="544" height="320" rx="24" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)"/>
    <text x="34" y="42" fill="#40bcff" font-size="16" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="2.8">APPOINTMENT DETAILS</text>

    <text x="34" y="98" fill="#95a4b5" font-size="15" font-family="Arial,sans-serif" font-weight="700">DATE</text>
    <text x="34" y="130" fill="#ffffff" font-size="34" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700">[DAY] [DATE]</text>

    <text x="320" y="98" fill="#95a4b5" font-size="15" font-family="Arial,sans-serif" font-weight="700">TIME</text>
    <text x="320" y="130" fill="#ffc14f" font-size="34" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700">[TIME]</text>

    <text x="34" y="188" fill="#95a4b5" font-size="15" font-family="Arial,sans-serif" font-weight="700">VEHICLE</text>
    <text x="34" y="220" fill="#ffffff" font-size="30" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700">[VEHICLE MAKE / MODEL / YEAR]</text>

    <text x="34" y="268" fill="#95a4b5" font-size="15" font-family="Arial,sans-serif" font-weight="700">BOOKED WORK</text>
    <text x="34" y="300" fill="#d7e0ea" font-size="24" font-family="Arial,sans-serif">[QUOTE / EXHAUST / REPAIR / INSPECTION]</text>

    <text x="34" y="356" fill="#d7e0ea" font-size="20" font-family="Arial,sans-serif">Questions before arrival? Call 02 4256 3740 or reply to the booking email.</text>
  </g>
</svg>
