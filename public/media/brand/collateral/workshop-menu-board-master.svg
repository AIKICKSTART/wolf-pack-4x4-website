<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200" role="img" aria-labelledby="title desc">
  <title id="title">Oak Flats Muffler Men workshop menu board master</title>
  <desc id="desc">On-site workshop menu board master for reception, service desks, and waiting-area presentation.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05070b"/>
      <stop offset="56%" stop-color="#0f151c"/>
      <stop offset="100%" stop-color="#11161d"/>
    </linearGradient>
    <radialGradient id="glow" cx="100%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#40bcff" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#40bcff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e62028"/>
      <stop offset="54%" stop-color="#ffc14f"/>
      <stop offset="100%" stop-color="#40bcff"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="1200" fill="url(#bg)"/>
  <rect width="1600" height="1200" fill="url(#glow)"/>
  <rect x="42" y="42" width="1516" height="1116" rx="34" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
  <rect x="42" y="42" width="1516" height="10" rx="5" fill="url(#accent)"/>

  <image href="/media/brand/mufflermen-logo-nav.webp" x="84" y="84" width="340" height="104" preserveAspectRatio="xMinYMid meet"/>
  <text x="86" y="246" fill="#40bcff" font-size="20" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="3">WORKSHOP MENU BOARD MASTER</text>
  <text x="86" y="320" fill="#f7fafc" font-size="72" font-family="'Bahnschrift Condensed','Arial Narrow',Arial,sans-serif" font-weight="700">SERVICES, OFFERS, AND CALL-TO-BOOK</text>
  <text x="86" y="376" fill="#d7e0ea" font-size="28" font-family="Arial,sans-serif">Use as the base board for reception, waiting zones, and service counters so the workshop feels as branded as the campaigns.</text>

  <g transform="translate(86 462)">
    <rect x="0" y="0" width="450" height="280" rx="28" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)"/>
    <text x="28" y="42" fill="#ffc14f" font-size="18" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="2.2">POPULAR FITMENTS</text>
    <text x="28" y="102" fill="#ffffff" font-size="30" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700">[CUSTOM EXHAUST]</text>
    <text x="28" y="148" fill="#ffffff" font-size="30" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700">[MUFFLER UPGRADE]</text>
    <text x="28" y="194" fill="#ffffff" font-size="30" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700">[4X4 FITMENT]</text>
    <text x="28" y="240" fill="#ffffff" font-size="30" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700">[TIG FABRICATION]</text>
  </g>

  <g transform="translate(574 462)">
    <rect x="0" y="0" width="450" height="280" rx="28" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)"/>
    <text x="28" y="42" fill="#40bcff" font-size="18" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="2.2">CURRENT OFFERS</text>
    <text x="28" y="102" fill="#ffffff" font-size="28" font-family="Arial,sans-serif">[Offer headline]</text>
    <text x="28" y="146" fill="#d7e0ea" font-size="24" font-family="Arial,sans-serif">[Offer body or price strip]</text>
    <text x="28" y="206" fill="#ffffff" font-size="28" font-family="Arial,sans-serif">[Second offer or CTA]</text>
    <text x="28" y="250" fill="#d7e0ea" font-size="24" font-family="Arial,sans-serif">[Extra service note]</text>
  </g>

  <g transform="translate(1062 462)">
    <rect x="0" y="0" width="450" height="280" rx="28" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)"/>
    <text x="28" y="42" fill="#ffffff" font-size="18" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="2.2">BOOK NOW</text>
    <text x="28" y="128" fill="#ffc14f" font-size="58" font-family="'Bahnschrift Condensed','Arial Narrow',Arial,sans-serif" font-weight="700">02 4256 3740</text>
    <text x="28" y="182" fill="#ffffff" font-size="28" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700">mufflermen.com.au</text>
    <text x="28" y="232" fill="#d7e0ea" font-size="22" font-family="Arial,sans-serif">Unit 2/8 Shaban St, Albion Park Rail NSW 2527</text>
  </g>

  <g transform="translate(86 794)">
    <rect x="0" y="0" width="1426" height="276" rx="28" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.10)"/>
    <text x="30" y="46" fill="#95a4b5" font-size="18" font-family="Arial,sans-serif" font-weight="700">INSTALLATION NOTES / BRAND STRIP</text>
    <text x="30" y="114" fill="#d7e0ea" font-size="28" font-family="Arial,sans-serif">Use this lower band for quality claims, booking reminders, service-area messages, or trust language.</text>
    <g transform="translate(30 170)">
      <rect x="0" y="0" width="228" height="44" rx="22" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.14)"/>
      <text x="114" y="28" text-anchor="middle" fill="#ffc14f" font-size="14" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="2">CUSTOM EXHAUST</text>
    </g>
    <g transform="translate(276 170)">
      <rect x="0" y="0" width="194" height="44" rx="22" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.14)"/>
      <text x="97" y="28" text-anchor="middle" fill="#40bcff" font-size="14" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="2">4X4 FITMENT</text>
    </g>
    <g transform="translate(488 170)">
      <rect x="0" y="0" width="162" height="44" rx="22" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.14)"/>
      <text x="81" y="28" text-anchor="middle" fill="#ffffff" font-size="14" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="2">TIG FAB</text>
    </g>
  </g>
</svg>
