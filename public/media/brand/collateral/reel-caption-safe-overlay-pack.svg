<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">Oak Flats Muffler Men reel caption-safe overlay pack</title>
  <desc id="desc">Motion overlay master showing subtitle-safe, lower-third, and CTA-safe areas for workshop reels and continuity-pack cutdowns.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#04060a"/>
      <stop offset="52%" stop-color="#10161d"/>
      <stop offset="100%" stop-color="#1a0f14"/>
    </linearGradient>
    <radialGradient id="glow" cx="100%" cy="0%" r="74%">
      <stop offset="0%" stop-color="#e62028" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#e62028" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e62028"/>
      <stop offset="54%" stop-color="#ffc14f"/>
      <stop offset="100%" stop-color="#40bcff"/>
    </linearGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#glow)"/>
  <rect x="56" y="56" width="1808" height="968" rx="38" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
  <rect x="56" y="56" width="1808" height="10" rx="5" fill="url(#accent)"/>

  <image href="/media/brand/mufflermen-logo-nav.webp" x="110" y="104" width="360" height="108" preserveAspectRatio="xMinYMid meet"/>
  <text x="112" y="292" fill="#40bcff" font-size="24" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="3.2">REEL CAPTION-SAFE OVERLAY MASTER</text>
  <text x="112" y="388" fill="#f7fafc" font-size="96" font-family="'Bahnschrift Condensed','Arial Narrow',Arial,sans-serif" font-weight="700">DROP VIDEO UNDER THIS</text>
  <text x="112" y="452" fill="#d7e0ea" font-size="34" font-family="Arial,sans-serif">Use as the motion-safe master for workshop reels, continuity-pack cutdowns, and quote explainer edits.</text>

  <rect x="110" y="520" width="1700" height="430" rx="32" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.12)" stroke-dasharray="22 16"/>
  <text x="960" y="740" text-anchor="middle" fill="#95a4b5" font-size="38" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="2">VIDEO CONTENT AREA</text>

  <rect x="168" y="842" width="1040" height="118" rx="22" fill="rgba(0,0,0,0.46)" stroke="rgba(255,255,255,0.14)"/>
  <text x="210" y="886" fill="#ffc14f" font-size="18" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="2.2">SUBTITLE / LOWER-THIRD SAFE AREA</text>
  <text x="210" y="930" fill="#ffffff" font-size="28" font-family="Arial,sans-serif">[Use for captions, service notes, and lower-third callouts without platform overlap]</text>

  <g transform="translate(1308 820)">
    <rect x="0" y="0" width="430" height="140" rx="24" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.14)"/>
    <text x="32" y="48" fill="#40bcff" font-size="18" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="2.2">CTA SAFE AREA</text>
    <text x="32" y="92" fill="#ffffff" font-size="28" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700">02 4256 3740</text>
    <text x="32" y="126" fill="#d7e0ea" font-size="20" font-family="Arial,sans-serif">Book, call, review, or follow-up CTA</text>
  </g>
</svg>
