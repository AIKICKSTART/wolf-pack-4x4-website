<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200" role="img" aria-labelledby="title desc">
  <title id="title">Oak Flats Muffler Men service handover photo frame</title>
  <desc id="desc">Branded photo frame for real pickup-day workshop photos, aftercare emails, and social proof posts.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05070b"/>
      <stop offset="56%" stop-color="#10161d"/>
      <stop offset="100%" stop-color="#10161b"/>
    </linearGradient>
    <radialGradient id="glow" cx="100%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#40bcff" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#40bcff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e62028"/>
      <stop offset="54%" stop-color="#ffc14f"/>
      <stop offset="100%" stop-color="#40bcff"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="1200" fill="url(#bg)"/>
  <rect width="1600" height="1200" fill="url(#glow)"/>
  <rect x="44" y="44" width="1512" height="1112" rx="34" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
  <rect x="44" y="44" width="1512" height="10" rx="5" fill="url(#accent)"/>

  <image href="/media/brand/mufflermen-logo-nav.webp" x="86" y="86" width="340" height="104" preserveAspectRatio="xMinYMid meet"/>
  <text x="88" y="246" fill="#40bcff" font-size="20" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="3">SERVICE HANDOVER PHOTO FRAME</text>
  <text x="88" y="324" fill="#f7fafc" font-size="74" font-family="'Bahnschrift Condensed','Arial Narrow',Arial,sans-serif" font-weight="700">PICKUP DAY READY</text>
  <text x="88" y="382" fill="#d7e0ea" font-size="28" font-family="Arial,sans-serif">Wrap real workshop delivery photos with vehicle, work-completed, and contact details for repeatable customer-proof media.</text>

  <rect x="88" y="454" width="946" height="620" rx="30" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.12)" stroke-dasharray="16 12"/>
  <text x="561" y="780" text-anchor="middle" fill="#95a4b5" font-size="34" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="2">DROP REAL HANDOVER PHOTO HERE</text>

  <g transform="translate(1092 454)">
    <rect x="0" y="0" width="392" height="620" rx="28" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)"/>
    <text x="30" y="50" fill="#ffc14f" font-size="18" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="2.4">CUSTOMER DELIVERY NOTES</text>

    <text x="30" y="118" fill="#95a4b5" font-size="15" font-family="Arial,sans-serif" font-weight="700">VEHICLE</text>
    <text x="30" y="152" fill="#ffffff" font-size="30" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700">[MAKE / MODEL / YEAR]</text>

    <text x="30" y="214" fill="#95a4b5" font-size="15" font-family="Arial,sans-serif" font-weight="700">COMPLETED WORK</text>
    <text x="30" y="248" fill="#d7e0ea" font-size="24" font-family="Arial,sans-serif">[EXHAUST / REPAIR / FITMENT / FAB]</text>

    <text x="30" y="314" fill="#95a4b5" font-size="15" font-family="Arial,sans-serif" font-weight="700">PICKUP DATE</text>
    <text x="30" y="348" fill="#ffffff" font-size="28" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700">[DAY] [DATE]</text>

    <text x="30" y="410" fill="#95a4b5" font-size="15" font-family="Arial,sans-serif" font-weight="700">FOLLOW-UP CTA</text>
    <text x="30" y="444" fill="#d7e0ea" font-size="24" font-family="Arial,sans-serif">Thanks for trusting Mufflermen. Reply anytime for a check-in or review link.</text>

    <text x="30" y="530" fill="#ffc14f" font-size="56" font-family="'Bahnschrift Condensed','Arial Narrow',Arial,sans-serif" font-weight="700">02 4256 3740</text>
    <text x="30" y="574" fill="#ffffff" font-size="26" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700">mufflermen.com.au</text>
    <text x="30" y="614" fill="#d7e0ea" font-size="22" font-family="Arial,sans-serif">Unit 2/8 Shaban St, Albion Park Rail NSW 2527</text>
  </g>

  <g transform="translate(88 1110)">
    <rect x="0" y="0" width="232" height="42" rx="21" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.14)"/>
    <text x="116" y="27" text-anchor="middle" fill="#ffc14f" font-size="14" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="2">CUSTOM EXHAUST</text>
  </g>
  <g transform="translate(336 1110)">
    <rect x="0" y="0" width="198" height="42" rx="21" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.14)"/>
    <text x="99" y="27" text-anchor="middle" fill="#40bcff" font-size="14" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="2">4X4 FITMENT</text>
  </g>
  <g transform="translate(550 1110)">
    <rect x="0" y="0" width="164" height="42" rx="21" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.14)"/>
    <text x="82" y="27" text-anchor="middle" fill="#ffffff" font-size="14" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="2">TIG FAB</text>
  </g>
</svg>
