<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1200" viewBox="0 0 2400 1200" role="img" aria-labelledby="title desc">
  <title id="title">Oak Flats Muffler Men trackside fence mesh banner pack</title>
  <desc id="desc">Large-format trackside fence mesh banner master for club days, paddock edges, and sponsor photo backdrops.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05070b"/>
      <stop offset="56%" stop-color="#151017"/>
      <stop offset="100%" stop-color="#11161d"/>
    </linearGradient>
    <radialGradient id="glow" cx="100%" cy="0%" r="74%">
      <stop offset="0%" stop-color="#ffc14f" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#ffc14f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e62028"/>
      <stop offset="54%" stop-color="#ffc14f"/>
      <stop offset="100%" stop-color="#40bcff"/>
    </linearGradient>
  </defs>

  <rect width="2400" height="1200" fill="url(#bg)"/>
  <rect width="2400" height="1200" fill="url(#glow)"/>
  <rect x="44" y="44" width="2312" height="1112" rx="34" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
  <rect x="44" y="44" width="2312" height="10" rx="5" fill="url(#accent)"/>

  <image href="/media/brand/mufflermen-logo-primary.webp" x="102" y="108" width="520" height="152" preserveAspectRatio="xMinYMid meet"/>
  <text x="104" y="358" fill="#40bcff" font-size="26" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="3.2">TRACKSIDE FENCE MESH BANNER MASTER</text>
  <text x="104" y="470" fill="#f7fafc" font-size="116" font-family="'Bahnschrift Condensed','Arial Narrow',Arial,sans-serif" font-weight="700">CUSTOM EXHAUST</text>
  <text x="104" y="568" fill="#f7fafc" font-size="116" font-family="'Bahnschrift Condensed','Arial Narrow',Arial,sans-serif" font-weight="700">4X4 FITMENT</text>
  <text x="104" y="666" fill="#ffc14f" font-size="116" font-family="'Bahnschrift Condensed','Arial Narrow',Arial,sans-serif" font-weight="700">TIG FABRICATION</text>
  <text x="104" y="742" fill="#d7e0ea" font-size="34" font-family="Arial,sans-serif">Use for club days, paddock fences, sponsor photos, and performance-community event presence.</text>

  <g transform="translate(104 850)">
    <rect x="0" y="0" width="304" height="58" rx="29" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.14)"/>
    <text x="152" y="37" text-anchor="middle" fill="#ffc14f" font-size="18" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="2">OAK FLATS, NSW</text>
  </g>
  <g transform="translate(426 850)">
    <rect x="0" y="0" width="284" height="58" rx="29" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.14)"/>
    <text x="142" y="37" text-anchor="middle" fill="#40bcff" font-size="18" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="2">WORKSHOP BUILT</text>
  </g>
  <g transform="translate(728 850)">
    <rect x="0" y="0" width="256" height="58" rx="29" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.14)"/>
    <text x="128" y="37" text-anchor="middle" fill="#ffffff" font-size="18" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="2">BOOK NOW</text>
  </g>

  <text x="1566" y="978" fill="#ffc14f" font-size="80" font-family="'Bahnschrift Condensed','Arial Narrow',Arial,sans-serif" font-weight="700">02 4256 3740</text>
  <text x="1566" y="1050" fill="#ffffff" font-size="34" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700">mufflermen.com.au</text>
