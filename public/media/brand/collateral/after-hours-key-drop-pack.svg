<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200" role="img" aria-labelledby="title desc">
  <title id="title">Oak Flats Muffler Men after-hours key-drop pack</title>
  <desc id="desc">After-hours key-drop pack master including envelope, instruction card, and check-in slip.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05070b"/>
      <stop offset="56%" stop-color="#10161d"/>
      <stop offset="100%" stop-color="#0f151b"/>
    </linearGradient>
    <radialGradient id="glow" cx="100%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#40bcff" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#40bcff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e62028"/>
      <stop offset="54%" stop-color="#ffc14f"/>
      <stop offset="100%" stop-color="#40bcff"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="1200" fill="url(#bg)"/>
  <rect width="1600" height="1200" fill="url(#glow)"/>
  <rect x="42" y="42" width="1516" height="1116" rx="34" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
  <rect x="42" y="42" width="1516" height="10" rx="5" fill="url(#accent)"/>

  <image href="/media/brand/mufflermen-logo-nav.webp" x="84" y="84" width="340" height="104" preserveAspectRatio="xMinYMid meet"/>
  <text x="86" y="246" fill="#40bcff" font-size="20" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="3">AFTER-HOURS KEY-DROP PACK</text>
  <text x="86" y="320" fill="#f7fafc" font-size="72" font-family="'Bahnschrift Condensed','Arial Narrow',Arial,sans-serif" font-weight="700">LEAVE KEYS WITH CLARITY</text>
  <text x="86" y="376" fill="#d7e0ea" font-size="28" font-family="Arial,sans-serif">Use as the master for night-drop envelopes, instruction cards, and vehicle check-in slips before opening or after close.</text>

  <g transform="translate(86 462)">
    <rect x="0" y="0" width="438" height="560" rx="28" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)"/>
    <text x="28" y="44" fill="#ffc14f" font-size="18" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="2.2">KEY ENVELOPE</text>
    <rect x="28" y="80" width="382" height="420" rx="22" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
    <text x="219" y="308" text-anchor="middle" fill="#95a4b5" font-size="28" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700">DROP ENVELOPE ART HERE</text>
    <text x="28" y="534" fill="#d7e0ea" font-size="22" font-family="Arial,sans-serif">Use for the physical envelope or key wallet.</text>
  </g>

  <g transform="translate(580 462)">
    <rect x="0" y="0" width="438" height="560" rx="28" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)"/>
    <text x="28" y="44" fill="#40bcff" font-size="18" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="2.2">DROP INSTRUCTIONS</text>
    <text x="28" y="120" fill="#ffffff" font-size="28" font-family="Arial,sans-serif">1. Fill out your vehicle and contact details.</text>
    <text x="28" y="176" fill="#ffffff" font-size="28" font-family="Arial,sans-serif">2. Place keys and notes into the envelope.</text>
    <text x="28" y="232" fill="#ffffff" font-size="28" font-family="Arial,sans-serif">3. Drop it into the secure slot.</text>
    <text x="28" y="288" fill="#ffffff" font-size="28" font-family="Arial,sans-serif">4. We will confirm in the morning.</text>
    <text x="28" y="386" fill="#d7e0ea" font-size="22" font-family="Arial,sans-serif">Use this panel for door signage or an instruction insert.</text>
  </g>

  <g transform="translate(1074 462)">
    <rect x="0" y="0" width="438" height="560" rx="28" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)"/>
    <text x="28" y="44" fill="#ffffff" font-size="18" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="2.2">CHECK-IN SLIP</text>
    <text x="28" y="118" fill="#95a4b5" font-size="15" font-family="Arial,sans-serif" font-weight="700">VEHICLE</text>
    <text x="28" y="152" fill="#ffffff" font-size="26" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700">[MAKE / MODEL / YEAR]</text>
    <text x="28" y="214" fill="#95a4b5" font-size="15" font-family="Arial,sans-serif" font-weight="700">CUSTOMER</text>
    <text x="28" y="248" fill="#ffffff" font-size="26" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700">[NAME / PHONE]</text>
    <text x="28" y="310" fill="#95a4b5" font-size="15" font-family="Arial,sans-serif" font-weight="700">WORK REQUEST</text>
    <text x="28" y="344" fill="#d7e0ea" font-size="22" font-family="Arial,sans-serif">[EXHAUST / REPAIR / INSPECTION / OTHER]</text>
    <text x="28" y="442" fill="#ffc14f" font-size="22" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="2">02 4256 3740</text>
    <text x="28" y="486" fill="#ffffff" font-size="24" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700">mufflermen.com.au</text>
  </g>
</svg>
