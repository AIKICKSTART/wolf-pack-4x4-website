<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">Oak Flats Muffler Men video sign-off end frame</title>
  <desc id="desc">16 by 9 branded end-frame sign-off for workshop reels, continuity pack cutdowns, and campaign outros.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#04060a"/>
      <stop offset="52%" stop-color="#11171f"/>
      <stop offset="100%" stop-color="#1b0f14"/>
    </linearGradient>
    <radialGradient id="glow" cx="100%" cy="0%" r="74%">
      <stop offset="0%" stop-color="#40bcff" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#40bcff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e62028"/>
      <stop offset="54%" stop-color="#ffc14f"/>
      <stop offset="100%" stop-color="#40bcff"/>
    </linearGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#glow)"/>
  <rect x="58" y="58" width="1804" height="964" rx="38" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
  <rect x="58" y="58" width="1804" height="10" rx="5" fill="url(#accent)"/>

  <image href="/media/brand/mufflermen-logo-primary.webp" x="112" y="112" width="470" height="138" preserveAspectRatio="xMinYMid meet"/>

  <text x="112" y="352" fill="#40bcff" font-size="26" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="3.4">VIDEO SIGN-OFF END FRAME</text>
  <text x="112" y="474" fill="#f7fafc" font-size="124" font-family="'Bahnschrift Condensed','Arial Narrow',Arial,sans-serif" font-weight="700">BOOK YOUR FITMENT</text>
  <text x="112" y="562" fill="#d7e0ea" font-size="36" font-family="Arial,sans-serif">Use as the branded outro for workshop reels, continuity-pack cutdowns, quote videos, and campaign edits.</text>

  <g transform="translate(112 660)">
    <rect x="0" y="0" width="274" height="58" rx="29" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.14)"/>
    <text x="137" y="37" text-anchor="middle" fill="#ffc14f" font-size="18" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="2">CUSTOM EXHAUST</text>
  </g>
  <g transform="translate(406 660)">
    <rect x="0" y="0" width="226" height="58" rx="29" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.14)"/>
    <text x="113" y="37" text-anchor="middle" fill="#40bcff" font-size="18" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="2">4X4 FITMENT</text>
  </g>
  <g transform="translate(652 660)">
    <rect x="0" y="0" width="182" height="58" rx="29" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.14)"/>
    <text x="91" y="37" text-anchor="middle" fill="#ffffff" font-size="18" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="2">TIG FAB</text>
  </g>

  <text x="112" y="830" fill="#ffc14f" font-size="96" font-family="'Bahnschrift Condensed','Arial Narrow',Arial,sans-serif" font-weight="700">02 4256 3740</text>
  <text x="112" y="892" fill="#ffffff" font-size="38" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700">mufflermen.com.au</text>
  <text x="112" y="942" fill="#d7e0ea" font-size="30" font-family="Arial,sans-serif">Unit 2/8 Shaban St, Albion Park Rail NSW 2527</text>

  <g transform="translate(1190 166)">
    <rect x="0" y="0" width="596" height="748" rx="28" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)"/>
    <text x="36" y="54" fill="#40bcff" font-size="20" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="2.8">END-FRAME NOTES</text>
    <text x="36" y="128" fill="#95a4b5" font-size="18" font-family="Arial,sans-serif" font-weight="700">REPLACE IF NEEDED</text>
    <text x="36" y="166" fill="#ffffff" font-size="34" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700">[CAMPAIGN TITLE OR CTA]</text>
    <text x="36" y="236" fill="#95a4b5" font-size="18" font-family="Arial,sans-serif" font-weight="700">BEST USE</text>
    <text x="36" y="274" fill="#d7e0ea" font-size="28" font-family="Arial,sans-serif">Final three to five seconds of workshop reels and continuity-pack cutdowns.</text>
    <text x="36" y="366" fill="#95a4b5" font-size="18" font-family="Arial,sans-serif" font-weight="700">PAIR WITH</text>
    <text x="36" y="404" fill="#ffffff" font-size="28" font-family="Arial,sans-serif">Vehicle start frame, side reference, rear resolve, and exhaust detail clips.</text>
    <text x="36" y="504" fill="#95a4b5" font-size="18" font-family="Arial,sans-serif" font-weight="700">SAFE-AREA GUIDANCE</text>
    <text x="36" y="542" fill="#d7e0ea" font-size="28" font-family="Arial,sans-serif">Keep subtitles and platform overlays inside the central safe area before export.</text>
    <text x="36" y="646" fill="#ffc14f" font-size="26" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="2.2">DROP MOTION BACKGROUND OR CAR STILL BEHIND THIS MASTER</text>
  </g>
</svg>
