<svg width="1600" height="1200" viewBox="0 0 1600 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="118" y1="82" x2="1498" y2="1126" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06090D"/>
      <stop offset="0.55" stop-color="#111821"/>
      <stop offset="1" stop-color="#171015"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#111922"/>
      <stop offset="1" stop-color="#0A1016"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#40BCFF"/>
      <stop offset="1" stop-color="#FFC14F"/>
    </linearGradient>
    <filter id="shadow" x="-40" y="-40" width="1680" height="1280" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
    <style>
      .eyebrow { font: 700 14px 'Segoe UI', Arial, sans-serif; letter-spacing: 0.24em; text-transform: uppercase; fill: #40BCFF; }
      .label { font: 700 24px 'Segoe UI', Arial, sans-serif; letter-spacing: 0.16em; text-transform: uppercase; fill: #F5F7FA; }
      .headline { font: 800 40px 'Segoe UI', Arial, sans-serif; fill: #F7FAFC; }
      .body { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #B9C6D1; }
      .small { font: 600 14px 'Segoe UI', Arial, sans-serif; letter-spacing: 0.11em; text-transform: uppercase; fill: #9AA9B5; }
      .field { font: 700 18px 'Segoe UI', Arial, sans-serif; letter-spacing: 0.08em; text-transform: uppercase; fill: #F7FAFC; }
      .chip { font: 700 13px 'Segoe UI', Arial, sans-serif; letter-spacing: 0.12em; text-transform: uppercase; fill: #F7FAFC; }
    </style>
  </defs>

  <rect width="1600" height="1200" rx="40" fill="url(#bg)"/>
  <circle cx="1360" cy="148" r="290" fill="#40BCFF" opacity="0.11"/>
  <circle cx="126" cy="1082" r="190" fill="#FFC14F" opacity="0.08"/>
  <rect x="68" y="68" width="1464" height="1064" rx="30" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>

  <image href="/media/brand/mufflermen-logo-primary.webp" x="92" y="78" width="308" height="90" preserveAspectRatio="xMidYMid meet"/>
  <text x="92" y="210" class="eyebrow">B2B onboarding collateral / trade workflow kit</text>
  <text x="92" y="262" class="headline">Trade-account starter kit</text>
  <text x="92" y="310" class="body">A single branded surface for rate setup, account intake, and key contacts when repairers, fleets, and repeat trade customers come on board.</text>

  <g filter="url(#shadow)">
    <rect x="92" y="376" width="436" height="648" rx="28" fill="url(#panel)"/>
    <text x="124" y="424" class="eyebrow">Rate card</text>
    <text x="124" y="470" class="label" font-size="30">Commercial service rates</text>
    <rect x="124" y="508" width="372" height="2" fill="url(#accent)"/>

    <rect x="124" y="554" width="372" height="88" rx="18" fill="#0C1319" stroke="rgba(255,255,255,0.08)"/>
    <text x="148" y="590" class="small">Custom exhaust fabrication</text>
    <text x="148" y="624" class="field">[hourly rate / min charge / lead time]</text>

    <rect x="124" y="666" width="372" height="88" rx="18" fill="#0C1319" stroke="rgba(255,255,255,0.08)"/>
    <text x="148" y="702" class="small">Fleet repair / replacement</text>
    <text x="148" y="736" class="field">[supply + fit / vehicle class / ETA]</text>

    <rect x="124" y="778" width="372" height="88" rx="18" fill="#0C1319" stroke="rgba(255,255,255,0.08)"/>
    <text x="148" y="814" class="small">Priority turnaround</text>
    <text x="148" y="848" class="field">[same-day / booking window / approval]</text>

    <rect x="124" y="904" width="180" height="38" rx="19" fill="#40BCFF"/>
    <text x="154" y="929" class="chip">Account rates</text>
    <rect x="320" y="904" width="176" height="38" rx="19" fill="#16212B" stroke="rgba(255,255,255,0.12)"/>
    <text x="349" y="929" class="chip">Trade pricing</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="580" y="376" width="440" height="648" rx="28" fill="url(#panel)"/>
    <text x="612" y="424" class="eyebrow">Account form</text>
    <text x="612" y="470" class="label" font-size="30">Open the trade account cleanly</text>
    <text x="612" y="512" class="body">Keep onboarding details in one readable branded form instead of piecing them together through emails and phone notes.</text>

    <text x="612" y="584" class="small">Business name</text>
    <rect x="612" y="598" width="376" height="48" rx="12" stroke="rgba(255,255,255,0.16)"/>
    <text x="632" y="628" class="field">[business / workshop / fleet]</text>

    <text x="612" y="686" class="small">ABN / account code</text>
    <rect x="612" y="700" width="376" height="48" rx="12" stroke="rgba(255,255,255,0.16)"/>
    <text x="632" y="730" class="field">[abn] [customer code]</text>

    <text x="612" y="788" class="small">Accounts contact</text>
    <rect x="612" y="802" width="376" height="48" rx="12" stroke="rgba(255,255,255,0.16)"/>
    <text x="632" y="832" class="field">[name / email / phone]</text>

    <text x="612" y="890" class="small">Approval terms</text>
    <rect x="612" y="904" width="376" height="72" rx="12" stroke="rgba(255,255,255,0.16)"/>
    <text x="632" y="936" class="field">[po required] [payment terms]</text>
    <text x="632" y="964" class="field">[quote threshold] [after-hours contact]</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1072" y="376" width="436" height="648" rx="28" fill="url(#panel)"/>
    <text x="1104" y="424" class="eyebrow">Trade contact sheet</text>
    <text x="1104" y="470" class="label" font-size="30">Key contacts and booking flow</text>

    <rect x="1104" y="528" width="372" height="116" rx="18" fill="#0C1319" stroke="rgba(255,255,255,0.08)"/>
    <text x="1128" y="564" class="small">Bookings and estimates</text>
    <text x="1128" y="602" class="body">[service desk contact] handles quote requests, account bookings, lead-time checks, and intake scheduling.</text>

    <rect x="1104" y="668" width="372" height="116" rx="18" fill="#0C1319" stroke="rgba(255,255,255,0.08)"/>
    <text x="1128" y="704" class="small">Accounts and approvals</text>
    <text x="1128" y="742" class="body">[accounts contact] handles PO follow-up, invoice questions, credit terms, and commercial sign-off requirements.</text>

    <rect x="1104" y="808" width="372" height="116" rx="18" fill="#0C1319" stroke="rgba(255,255,255,0.08)"/>
    <text x="1128" y="844" class="small">Urgent vehicle support</text>
    <text x="1128" y="882" class="body">[priority contact] handles stranded vehicles, urgent fleet downtime, and after-hours handoff questions.</text>

    <rect x="1104" y="950" width="140" height="38" rx="19" fill="#FFC14F"/>
    <text x="1129" y="975" class="chip">Fleet ready</text>
    <rect x="1260" y="950" width="216" height="38" rx="19" fill="#16212B" stroke="rgba(255,255,255,0.12)"/>
    <text x="1285" y="975" class="chip">Repairer onboarding</text>
  </g>

  <rect x="92" y="1080" width="1416" height="2" fill="url(#accent)"/>
  <text x="92" y="1116" class="small">Oak Flats Muffler Men  /  02 4256 3740  /  0411 844 062  /  info@oakflatsmufflermen.com.au  /  mufflermen.com.au</text>
</svg>
