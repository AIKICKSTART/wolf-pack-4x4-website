<svg xmlns="http://www.w3.org/2000/svg" width="3240" height="1350" viewBox="0 0 3240 1350" role="img" aria-labelledby="title desc">
  <title id="title">Oak Flats Muffler Men post-service review proof carousel</title>
  <desc id="desc">Three-panel social proof carousel master for post-service reviews, handover photos, and customer follow-up promotion.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05070b"/>
      <stop offset="56%" stop-color="#11171f"/>
      <stop offset="100%" stop-color="#171018"/>
    </linearGradient>
    <radialGradient id="glow" cx="100%" cy="0%" r="74%">
      <stop offset="0%" stop-color="#ffc14f" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#ffc14f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e62028"/>
      <stop offset="54%" stop-color="#ffc14f"/>
      <stop offset="100%" stop-color="#40bcff"/>
    </linearGradient>
  </defs>

  <rect width="3240" height="1350" fill="url(#bg)"/>
  <rect width="3240" height="1350" fill="url(#glow)"/>
  <rect x="44" y="44" width="3152" height="1262" rx="34" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
  <rect x="44" y="44" width="3152" height="10" rx="5" fill="url(#accent)"/>

  <g transform="translate(94 94)">
    <image href="/media/brand/mufflermen-logo-nav.webp" x="0" y="0" width="360" height="108" preserveAspectRatio="xMinYMid meet"/>
    <text x="0" y="188" fill="#40bcff" font-size="22" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="3">POST-SERVICE REVIEW PROOF CAROUSEL</text>
  </g>

  <g transform="translate(94 300)">
    <rect x="0" y="0" width="980" height="954" rx="30" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)"/>
    <text x="36" y="48" fill="#ffc14f" font-size="20" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="2.4">CARD 01 · HANDOVER PHOTO</text>
    <rect x="36" y="84" width="908" height="590" rx="26" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-dasharray="18 12"/>
    <text x="490" y="390" text-anchor="middle" fill="#95a4b5" font-size="34" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700">DROP PICKUP-DAY PHOTO</text>
    <text x="36" y="754" fill="#ffffff" font-size="48" font-family="'Bahnschrift Condensed','Arial Narrow',Arial,sans-serif" font-weight="700">DELIVERED AND READY</text>
    <text x="36" y="808" fill="#d7e0ea" font-size="28" font-family="Arial,sans-serif">[Vehicle] · [Work completed] · [Pickup date]</text>
    <text x="36" y="888" fill="#40bcff" font-size="24" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700">Oak Flats Muffler Men</text>
  </g>

  <g transform="translate(1129 300)">
    <rect x="0" y="0" width="980" height="954" rx="30" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)"/>
    <text x="36" y="48" fill="#40bcff" font-size="20" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="2.4">CARD 02 · CUSTOMER QUOTE</text>
    <text x="36" y="186" fill="#ffffff" font-size="60" font-family="'Bahnschrift Condensed','Arial Narrow',Arial,sans-serif" font-weight="700">“[CUSTOMER FEEDBACK]</text>
    <text x="36" y="256" fill="#ffffff" font-size="60" font-family="'Bahnschrift Condensed','Arial Narrow',Arial,sans-serif" font-weight="700">ABOUT THE FITMENT”</text>
    <text x="36" y="360" fill="#d7e0ea" font-size="34" font-family="Arial,sans-serif">Use this card for the strongest result, sound, or service comment from the customer.</text>
    <g transform="translate(36 648)">
      <rect x="0" y="0" width="290" height="52" rx="26" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.14)"/>
      <text x="145" y="34" text-anchor="middle" fill="#ffc14f" font-size="16" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="2">CUSTOM EXHAUST</text>
    </g>
    <g transform="translate(346 648)">
      <rect x="0" y="0" width="248" height="52" rx="26" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.14)"/>
      <text x="124" y="34" text-anchor="middle" fill="#40bcff" font-size="16" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="2">4X4 FITMENT</text>
    </g>
    <g transform="translate(614 648)">
      <rect x="0" y="0" width="180" height="52" rx="26" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.14)"/>
      <text x="90" y="34" text-anchor="middle" fill="#ffffff" font-size="16" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="2">TIG FAB</text>
    </g>
  </g>

  <g transform="translate(2164 300)">
    <rect x="0" y="0" width="980" height="954" rx="30" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)"/>
    <text x="36" y="48" fill="#ffc14f" font-size="20" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="2.4">CARD 03 · REVIEW CTA</text>
    <text x="36" y="174" fill="#ffffff" font-size="84" font-family="'Bahnschrift Condensed','Arial Narrow',Arial,sans-serif" font-weight="700">THANKS FOR THE TRUST</text>
    <text x="36" y="250" fill="#d7e0ea" font-size="30" font-family="Arial,sans-serif">Use the final card to ask for a review, follow-up booking, or send the next-service reminder.</text>
    <text x="36" y="428" fill="#40bcff" font-size="28" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700">BOOK · REVIEW · CHECK-IN</text>
    <text x="36" y="542" fill="#ffc14f" font-size="68" font-family="'Bahnschrift Condensed','Arial Narrow',Arial,sans-serif" font-weight="700">02 4256 3740</text>
    <text x="36" y="600" fill="#ffffff" font-size="32" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700">mufflermen.com.au</text>
    <text x="36" y="648" fill="#d7e0ea" font-size="26" font-family="Arial,sans-serif">Unit 2/8 Shaban St, Albion Park Rail NSW 2527</text>
  </g>
</svg>
