<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350" role="img" aria-labelledby="title desc">
  <title id="title">Oak Flats Muffler Men booking reminder mobile card</title>
  <desc id="desc">Vertical booking reminder card for SMS, email, and mobile surfaces with appointment placeholders.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06080d"/>
      <stop offset="52%" stop-color="#11161d"/>
      <stop offset="100%" stop-color="#0d1218"/>
    </linearGradient>
    <radialGradient id="glow" cx="94%" cy="0%" r="56%">
      <stop offset="0%" stop-color="#e62028" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#e62028" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e62028"/>
      <stop offset="54%" stop-color="#ffc14f"/>
      <stop offset="100%" stop-color="#40bcff"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1350" fill="url(#bg)"/>
  <rect width="1080" height="1350" fill="url(#glow)"/>
  <rect x="58" y="58" width="964" height="1234" rx="34" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
  <rect x="58" y="58" width="964" height="10" rx="5" fill="url(#accent)"/>

  <image href="/media/brand/mufflermen-logo-nav.webp" x="100" y="120" width="360" height="110" preserveAspectRatio="xMinYMid meet"/>
  <text x="100" y="292" fill="#40bcff" font-size="20" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="3">BOOKING REMINDER</text>
  <text x="100" y="392" fill="#f7fafc" font-size="108" font-family="'Bahnschrift Condensed','Arial Narrow',Arial,sans-serif" font-weight="700">SEE YOU</text>
  <text x="100" y="488" fill="#ffc14f" font-size="108" font-family="'Bahnschrift Condensed','Arial Narrow',Arial,sans-serif" font-weight="700">SOON</text>
  <text x="100" y="554" fill="#d7e0ea" font-size="28" font-family="Arial,sans-serif">Use for reminder emails, SMS share cards, and mobile-first booking journeys.</text>

  <g transform="translate(100 634)">
    <rect x="0" y="0" width="880" height="420" rx="28" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)"/>

    <text x="36" y="54" fill="#95a4b5" font-size="16" font-family="Arial,sans-serif" font-weight="700">DATE</text>
    <text x="36" y="110" fill="#ffffff" font-size="52" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700">[DAY] [DATE]</text>

    <text x="36" y="172" fill="#95a4b5" font-size="16" font-family="Arial,sans-serif" font-weight="700">TIME</text>
    <text x="36" y="228" fill="#40bcff" font-size="52" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700">[TIME]</text>

    <text x="36" y="290" fill="#95a4b5" font-size="16" font-family="Arial,sans-serif" font-weight="700">VEHICLE</text>
    <text x="36" y="344" fill="#ffffff" font-size="34" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700">[VEHICLE MAKE / MODEL / YEAR]</text>

    <text x="36" y="392" fill="#d7e0ea" font-size="23" font-family="Arial,sans-serif">Reply if you need to reschedule, add notes, or update your vehicle details before arrival.</text>
  </g>

  <g transform="translate(100 1100)">
    <rect x="0" y="0" width="254" height="82" rx="41" fill="#e62028"/>
    <text x="127" y="51" text-anchor="middle" fill="#ffffff" font-size="24" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="2">CALL NOW</text>
  </g>
  <text x="392" y="1150" fill="#f7fafc" font-size="34" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700">02 4256 3740</text>
  <text x="100" y="1234" fill="#d7e0ea" font-size="26" font-family="Arial,sans-serif">Unit 2/8 Shaban St, Albion Park Rail NSW 2527</text>
  <text x="100" y="1278" fill="#40bcff" font-size="22" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="2.6">CUSTOM EXHAUST  |  4X4 FITMENT  |  TIG FABRICATION</text>
</svg>
