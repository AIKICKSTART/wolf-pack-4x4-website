<svg xmlns="http://www.w3.org/2000/svg" width="210mm" height="297mm" viewBox="0 0 2100 2970" role="img" aria-labelledby="title desc">
  <title id="title">Oak Flats Muffler Men sticker sheet</title>
  <desc id="desc">A4 sticker and decal sheet with logo lockups, icon badges, and service slogans with cut guides.</desc>
  <defs>
    <linearGradient id="header" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e62028"/>
      <stop offset="55%" stop-color="#ffc14f"/>
      <stop offset="100%" stop-color="#40bcff"/>
    </linearGradient>
    <linearGradient id="dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080b10"/>
      <stop offset="100%" stop-color="#161b23"/>
    </linearGradient>
  </defs>

  <rect width="2100" height="2970" fill="#f6f7fa"/>
  <rect x="100" y="100" width="1900" height="180" rx="32" fill="url(#dark)"/>
  <rect x="100" y="100" width="1900" height="16" rx="8" fill="url(#header)"/>
  <image href="/media/brand/mufflermen-logo-primary.webp" x="160" y="148" width="500" height="146" preserveAspectRatio="xMinYMid meet"/>
  <text x="1780" y="182" text-anchor="end" fill="#40bcff" font-size="24" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" letter-spacing="2.8" font-weight="700">A4 STICKER SHEET</text>
  <text x="1780" y="222" text-anchor="end" fill="#f7fafc" font-size="34" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700">Cut on dashed guides</text>

  <g transform="translate(140 370)">
    <rect x="0" y="0" width="820" height="320" rx="46" fill="url(#dark)" stroke="#d7dde7" stroke-width="5" stroke-dasharray="18 14"/>
    <image href="/media/brand/mufflermen-logo-nav.webp" x="66" y="72" width="440" height="136" preserveAspectRatio="xMinYMid meet"/>
    <text x="66" y="254" fill="#ffc14f" font-size="32" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" letter-spacing="1.8" font-weight="700">EXHAUST  |  PERFORMANCE  |  FABRICATION</text>
  </g>

  <g transform="translate(1040 370)">
    <circle cx="230" cy="160" r="160" fill="url(#dark)" stroke="#d7dde7" stroke-width="5" stroke-dasharray="18 14"/>
    <image href="/media/brand/mufflermen-logo-icon-512.webp" x="108" y="38" width="244" height="244" preserveAspectRatio="xMidYMid meet"/>
  </g>

  <g transform="translate(1480 370)">
    <circle cx="230" cy="160" r="160" fill="#ffffff" stroke="#d7dde7" stroke-width="5" stroke-dasharray="18 14"/>
    <image href="/media/brand/mufflermen-logo-icon-512.webp" x="108" y="38" width="244" height="244" preserveAspectRatio="xMidYMid meet"/>
  </g>

  <g transform="translate(140 790)">
    <rect x="0" y="0" width="540" height="170" rx="85" fill="url(#dark)" stroke="#d7dde7" stroke-width="5" stroke-dasharray="18 14"/>
    <text x="270" y="102" text-anchor="middle" fill="#f7fafc" font-size="44" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" letter-spacing="2" font-weight="700">OAK FLATS</text>
  </g>
  <g transform="translate(740 790)">
    <rect x="0" y="0" width="540" height="170" rx="85" fill="#ffffff" stroke="#d7dde7" stroke-width="5" stroke-dasharray="18 14"/>
    <text x="270" y="102" text-anchor="middle" fill="#11161d" font-size="38" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" letter-spacing="2" font-weight="700">CUSTOM EXHAUSTS</text>
  </g>
  <g transform="translate(1340 790)">
    <rect x="0" y="0" width="620" height="170" rx="85" fill="#11161d" stroke="#d7dde7" stroke-width="5" stroke-dasharray="18 14"/>
    <text x="310" y="100" text-anchor="middle" fill="#40bcff" font-size="34" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" letter-spacing="2" font-weight="700">4X4  |  TIG  |  REPAIRS</text>
  </g>

  <g transform="translate(140 1060)">
    <rect x="0" y="0" width="590" height="590" rx="54" fill="url(#dark)" stroke="#d7dde7" stroke-width="5" stroke-dasharray="18 14"/>
    <image href="/media/generated/hsv-gtsr-w1-night-launch.webp" x="34" y="34" width="522" height="522" preserveAspectRatio="xMidYMid slice"/>
  </g>
  <g transform="translate(780 1060)">
    <rect x="0" y="0" width="590" height="590" rx="54" fill="url(#dark)" stroke="#d7dde7" stroke-width="5" stroke-dasharray="18 14"/>
    <image href="/media/generated/falcon-phase-iv-studio-legend.webp" x="34" y="34" width="522" height="522" preserveAspectRatio="xMidYMid slice"/>
  </g>
  <g transform="translate(1420 1060)">
    <rect x="0" y="0" width="540" height="590" rx="54" fill="url(#dark)" stroke="#d7dde7" stroke-width="5" stroke-dasharray="18 14"/>
    <text x="54" y="94" fill="#ffc14f" font-size="30" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" letter-spacing="2" font-weight="700">SERVICE STICKERS</text>
    <g font-family="Arial,sans-serif" font-size="26">
      <rect x="54" y="134" width="432" height="78" rx="39" fill="#ffffff"/>
      <text x="270" y="183" text-anchor="middle" fill="#11161d">BOOK A QUOTE</text>
      <rect x="54" y="236" width="432" height="78" rx="39" fill="#11161d" stroke="#40bcff"/>
      <text x="270" y="285" text-anchor="middle" fill="#40bcff">PERFORMANCE FITMENT</text>
      <rect x="54" y="338" width="432" height="78" rx="39" fill="#11161d" stroke="#ffc14f"/>
      <text x="270" y="387" text-anchor="middle" fill="#ffc14f">STAINLESS TIG FAB</text>
      <rect x="54" y="440" width="432" height="78" rx="39" fill="#11161d" stroke="#e62028"/>
      <text x="270" y="489" text-anchor="middle" fill="#f7fafc">02 4256 3740</text>
    </g>
  </g>

  <text x="140" y="2870" fill="#5f7183" font-size="24" font-family="Arial,sans-serif">Output on adhesive vinyl. Keep 4mm inside the dashed cut line for critical artwork.</text>
  <text x="1960" y="2870" text-anchor="end" fill="#5f7183" font-size="24" font-family="Arial,sans-serif">Oak Flats Muffler Men decal set</text>
</svg>
