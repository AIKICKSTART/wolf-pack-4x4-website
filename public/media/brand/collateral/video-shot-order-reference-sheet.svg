<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200" role="img" aria-labelledby="title desc">
  <title id="title">Oak Flats Muffler Men continuity shot-order reference sheet</title>
  <desc id="desc">Reference sheet for mapping continuity-pack frames into a consistent shot order for video generation and editorial handoff.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05070b"/>
      <stop offset="56%" stop-color="#10161d"/>
      <stop offset="100%" stop-color="#0f151b"/>
    </linearGradient>
    <radialGradient id="glow" cx="100%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#40bcff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#40bcff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e62028"/>
      <stop offset="54%" stop-color="#ffc14f"/>
      <stop offset="100%" stop-color="#40bcff"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="1200" fill="url(#bg)"/>
  <rect width="1600" height="1200" fill="url(#glow)"/>
  <rect x="42" y="42" width="1516" height="1116" rx="34" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
  <rect x="42" y="42" width="1516" height="10" rx="5" fill="url(#accent)"/>

  <image href="/media/brand/mufflermen-logo-nav.webp" x="82" y="84" width="340" height="104" preserveAspectRatio="xMinYMid meet"/>
  <text x="84" y="246" fill="#40bcff" font-size="20" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="3">CONTINUITY SHOT-ORDER SHEET</text>
  <text x="84" y="328" fill="#f7fafc" font-size="78" font-family="'Bahnschrift Condensed','Arial Narrow',Arial,sans-serif" font-weight="700">FRAME SEQUENCE MASTER</text>
  <text x="84" y="384" fill="#d7e0ea" font-size="28" font-family="Arial,sans-serif">Use this sheet to keep start, side, end, exhaust, and hoist frames in one prompt-ready motion handoff.</text>

  <g transform="translate(84 456)">
    <rect x="0" y="0" width="416" height="214" rx="26" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)"/>
    <text x="28" y="42" fill="#ffc14f" font-size="18" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="2.4">01 START FRAME</text>
    <rect x="28" y="66" width="360" height="112" rx="18" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
    <text x="208" y="129" text-anchor="middle" fill="#95a4b5" font-size="18" font-family="Arial,sans-serif">Drop front hero here</text>
    <text x="28" y="198" fill="#d7e0ea" font-size="20" font-family="Arial,sans-serif">Opening hero / establishing frame</text>
  </g>

  <g transform="translate(540 456)">
    <rect x="0" y="0" width="416" height="214" rx="26" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)"/>
    <text x="28" y="42" fill="#40bcff" font-size="18" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="2.4">02 SIDE / REFERENCE</text>
    <rect x="28" y="66" width="360" height="112" rx="18" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
    <text x="208" y="129" text-anchor="middle" fill="#95a4b5" font-size="18" font-family="Arial,sans-serif">Drop side profile here</text>
    <text x="28" y="198" fill="#d7e0ea" font-size="20" font-family="Arial,sans-serif">Silhouette match / transition bridge</text>
  </g>

  <g transform="translate(996 456)">
    <rect x="0" y="0" width="416" height="214" rx="26" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)"/>
    <text x="28" y="42" fill="#ffffff" font-size="18" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="2.4">03 END FRAME</text>
    <rect x="28" y="66" width="360" height="112" rx="18" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
    <text x="208" y="129" text-anchor="middle" fill="#95a4b5" font-size="18" font-family="Arial,sans-serif">Drop rear resolve here</text>
    <text x="28" y="198" fill="#d7e0ea" font-size="20" font-family="Arial,sans-serif">CTA hold / closing hero</text>
  </g>

  <g transform="translate(84 710)">
    <rect x="0" y="0" width="416" height="214" rx="26" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)"/>
    <text x="28" y="42" fill="#ffc14f" font-size="18" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="2.4">04 EXHAUST DETAIL</text>
    <rect x="28" y="66" width="360" height="112" rx="18" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
    <text x="208" y="129" text-anchor="middle" fill="#95a4b5" font-size="18" font-family="Arial,sans-serif">Drop macro detail here</text>
    <text x="28" y="198" fill="#d7e0ea" font-size="20" font-family="Arial,sans-serif">Feature callout / sound or hardware insert</text>
  </g>

  <g transform="translate(540 710)">
    <rect x="0" y="0" width="416" height="214" rx="26" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)"/>
    <text x="28" y="42" fill="#40bcff" font-size="18" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="2.4">05 HOIST / UNDERBODY</text>
    <rect x="28" y="66" width="360" height="112" rx="18" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
    <text x="208" y="129" text-anchor="middle" fill="#95a4b5" font-size="18" font-family="Arial,sans-serif">Drop underbody frame here</text>
    <text x="28" y="198" fill="#d7e0ea" font-size="20" font-family="Arial,sans-serif">Technical proof / routing reference</text>
  </g>

  <g transform="translate(996 710)">
    <rect x="0" y="0" width="416" height="214" rx="26" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)"/>
    <text x="28" y="42" fill="#ffffff" font-size="18" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="2.4">PROMPT NOTES</text>
    <text x="28" y="102" fill="#d7e0ea" font-size="22" font-family="Arial,sans-serif">[Vehicle]</text>
    <text x="28" y="140" fill="#d7e0ea" font-size="22" font-family="Arial,sans-serif">[Locked exterior location]</text>
    <text x="28" y="178" fill="#d7e0ea" font-size="22" font-family="Arial,sans-serif">[Lighting window]</text>
    <text x="28" y="216" fill="#d7e0ea" font-size="22" font-family="Arial,sans-serif">[Technical hoist scene]</text>
  </g>

  <text x="84" y="1014" fill="#95a4b5" font-size="18" font-family="Arial,sans-serif" font-weight="700">BEST USE</text>
  <text x="84" y="1054" fill="#ffffff" font-size="28" font-family="Arial,sans-serif">Image-to-video prompting, editor handoff, continuity review, and creative approvals.</text>
  <text x="84" y="1110" fill="#40bcff" font-size="20" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="2.6">KEEP EACH SLOT TIED TO THE SAME VEHICLE, SAME EXTERIOR LOCATION, AND SAME LIGHTING WINDOW</text>
</svg>
