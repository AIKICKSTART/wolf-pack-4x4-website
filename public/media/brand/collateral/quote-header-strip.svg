<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="360" viewBox="0 0 1600 360" role="img" aria-labelledby="title desc">
  <title id="title">Oak Flats Muffler Men quote header strip</title>
  <desc id="desc">Document header strip for quotes and invoices with logo, workshop summary, and contact information.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05070b"/>
      <stop offset="58%" stop-color="#11161d"/>
      <stop offset="100%" stop-color="#0c1319"/>
    </linearGradient>
    <radialGradient id="glow" cx="92%" cy="4%" r="62%">
      <stop offset="0%" stop-color="#40bcff" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#40bcff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e62028"/>
      <stop offset="52%" stop-color="#ffc14f"/>
      <stop offset="100%" stop-color="#40bcff"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="360" fill="url(#bg)"/>
  <rect width="1600" height="360" fill="url(#glow)"/>
  <rect x="56" y="52" width="1488" height="256" rx="28" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
  <rect x="56" y="52" width="1488" height="10" rx="5" fill="url(#accent)"/>

  <image href="/media/brand/mufflermen-logo-primary.webp" x="96" y="108" width="420" height="122" preserveAspectRatio="xMinYMid meet"/>
  <text x="96" y="268" fill="#f7fafc" font-size="26" font-family="Arial,sans-serif">Performance exhaust systems, repairs, 4x4 fitment, and TIG fabrication.</text>

  <g transform="translate(1002 98)">
    <text x="0" y="22" fill="#40bcff" font-size="16" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" letter-spacing="2.6" font-weight="700">WORKSHOP OPERATIONS</text>
    <text x="0" y="70" fill="#ffffff" font-size="34" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700">Oak Flats Muffler Men</text>
    <text x="0" y="112" fill="#d7e0ea" font-size="21" font-family="Arial,sans-serif">Unit 2/8 Shaban St, Albion Park Rail NSW 2527</text>
    <text x="0" y="150" fill="#ffc14f" font-size="24" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700">02 4256 3740   |   0411 844 062</text>
    <text x="0" y="188" fill="#d7e0ea" font-size="21" font-family="Arial,sans-serif">info@oakflatsmufflermen.com.au   |   mufflermen.com.au</text>
  </g>
</svg>
