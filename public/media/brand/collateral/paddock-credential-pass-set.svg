<svg width="1600" height="1200" viewBox="0 0 1600 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="84" x2="1492" y2="1126" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07090D"/>
      <stop offset="0.55" stop-color="#151018"/>
      <stop offset="1" stop-color="#121821"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#121922"/>
      <stop offset="1" stop-color="#0A1016"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFC14F"/>
      <stop offset="1" stop-color="#E62028"/>
    </linearGradient>
    <filter id="shadow" x="-40" y="-40" width="1680" height="1280" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
    <style>
      .eyebrow { font: 700 14px 'Segoe UI', Arial, sans-serif; letter-spacing: 0.24em; text-transform: uppercase; fill: #FFC14F; }
      .headline { font: 800 40px 'Segoe UI', Arial, sans-serif; fill: #F7FAFC; }
      .label { font: 700 24px 'Segoe UI', Arial, sans-serif; letter-spacing: 0.16em; text-transform: uppercase; fill: #F5F7FA; }
      .body { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #BBC6D1; }
      .small { font: 600 14px 'Segoe UI', Arial, sans-serif; letter-spacing: 0.11em; text-transform: uppercase; fill: #9FAAB4; }
      .field { font: 700 18px 'Segoe UI', Arial, sans-serif; letter-spacing: 0.08em; text-transform: uppercase; fill: #F7FAFC; }
      .chip { font: 700 13px 'Segoe UI', Arial, sans-serif; letter-spacing: 0.12em; text-transform: uppercase; fill: #F7FAFC; }
    </style>
  </defs>

  <rect width="1600" height="1200" rx="40" fill="url(#bg)"/>
  <circle cx="1360" cy="150" r="290" fill="#FFC14F" opacity="0.1"/>
  <circle cx="126" cy="1082" r="190" fill="#E62028" opacity="0.08"/>
  <rect x="68" y="68" width="1464" height="1064" rx="30" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>

  <image href="/media/brand/mufflermen-logo-primary.webp" x="92" y="78" width="308" height="90" preserveAspectRatio="xMidYMid meet"/>
  <text x="92" y="210" class="eyebrow">Event operations collateral / access control pack</text>
  <text x="92" y="262" class="headline">Paddock credential pass set</text>
  <text x="92" y="310" class="body">One branded system for crew lanyards, support-vehicle windscreens, and access badges at club days, open nights, and sponsor events.</text>

  <g filter="url(#shadow)">
    <rect x="94" y="378" width="420" height="650" rx="28" fill="url(#panel)"/>
    <circle cx="304" cy="444" r="26" fill="#0C1015" stroke="url(#accent)" stroke-width="8"/>
    <text x="126" y="520" class="eyebrow">Lanyard pass</text>
    <text x="126" y="568" class="label" font-size="30">Crew access</text>
    <rect x="126" y="606" width="356" height="2" fill="url(#accent)"/>
    <rect x="126" y="646" width="356" height="112" rx="18" fill="#0C1319" stroke="rgba(255,255,255,0.08)"/>
    <text x="150" y="682" class="small">Event / tier</text>
    <text x="150" y="718" class="field">[club day] [crew / media / vip]</text>
    <text x="150" y="798" class="small">Holder</text>
    <rect x="126" y="812" width="356" height="48" rx="12" stroke="rgba(255,255,255,0.16)"/>
    <text x="146" y="842" class="field">[name / team / phone]</text>
    <rect x="126" y="908" width="144" height="38" rx="19" fill="#E62028"/>
    <text x="154" y="933" class="chip">Hot area</text>
    <rect x="286" y="908" width="196" height="38" rx="19" fill="#1A232D" stroke="rgba(255,255,255,0.12)"/>
    <text x="313" y="933" class="chip">Back-of-house access</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="560" y="378" width="486" height="650" rx="28" fill="url(#panel)"/>
    <text x="592" y="426" class="eyebrow">Windscreen pass</text>
    <text x="592" y="472" class="label" font-size="30">Support vehicle credential</text>
    <text x="592" y="514" class="body">Keep club-day vehicles, trailers, and support cars identifiable without rebuilding the layout for each event.</text>

    <rect x="592" y="566" width="422" height="250" rx="24" fill="#0B1015" stroke="rgba(255,255,255,0.08)"/>
    <rect x="626" y="600" width="354" height="56" rx="16" fill="url(#accent)"/>
    <text x="695" y="636" class="field">PADDOCK ACCESS</text>
    <text x="626" y="706" class="small">Vehicle / event</text>
    <text x="626" y="742" class="field">[support ute] [event name]</text>
    <text x="626" y="790" class="small">Driver / bay / pass no.</text>
    <text x="626" y="826" class="field">[name] [bay] [0007]</text>

    <rect x="592" y="878" width="202" height="38" rx="19" fill="#16212B" stroke="rgba(255,255,255,0.12)"/>
    <text x="621" y="903" class="chip">Windscreen visible</text>
    <rect x="812" y="878" width="202" height="38" rx="19" fill="#16212B" stroke="rgba(255,255,255,0.12)"/>
    <text x="847" y="903" class="chip">Support vehicle</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1092" y="378" width="414" height="650" rx="28" fill="url(#panel)"/>
    <text x="1124" y="426" class="eyebrow">Crew badge</text>
    <text x="1124" y="472" class="label" font-size="30">Quick badge and zone key</text>

    <rect x="1154" y="530" width="290" height="196" rx="24" fill="#0B1015" stroke="rgba(255,255,255,0.08)"/>
    <text x="1184" y="572" class="small">Zone colour</text>
    <rect x="1184" y="590" width="230" height="54" rx="16" fill="#FFC14F"/>
    <text x="1267" y="625" class="field">AMBER PADDOCK</text>
    <text x="1184" y="684" class="small">Role</text>
    <text x="1184" y="716" class="field">[crew / media / marshal]</text>

    <rect x="1124" y="790" width="352" height="112" rx="18" fill="#0C1319" stroke="rgba(255,255,255,0.08)"/>
    <text x="1148" y="826" class="small">Access notes</text>
    <text x="1148" y="862" class="body">Use the same badge system across lanyards, windscreen passes, and gate checks so entry control stays consistent on the day.</text>

    <rect x="1124" y="928" width="156" height="38" rx="19" fill="#1A232D" stroke="rgba(255,255,255,0.12)"/>
    <text x="1151" y="953" class="chip">Crew issued</text>
    <rect x="1296" y="928" width="180" height="38" rx="19" fill="#1A232D" stroke="rgba(255,255,255,0.12)"/>
    <text x="1320" y="953" class="chip">Gate control</text>
  </g>

  <rect x="92" y="1080" width="1416" height="2" fill="url(#accent)"/>
  <text x="92" y="1116" class="small">Oak Flats Muffler Men  /  02 4256 3740  /  0411 844 062  /  info@oakflatsmufflermen.com.au  /  mufflermen.com.au</text>
</svg>
