<svg xmlns="http://www.w3.org/2000/svg" width="96mm" height="61mm" viewBox="0 0 960 610" role="img" aria-labelledby="title desc">
  <title id="title">Oak Flats Muffler Men business card front</title>
  <desc id="desc">Print-ready front business card with Oak Flats Muffler Men logo, services, and contact details.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05070b"/>
      <stop offset="58%" stop-color="#11161d"/>
      <stop offset="100%" stop-color="#190b0f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e62028"/>
      <stop offset="100%" stop-color="#ffc14f"/>
    </linearGradient>
    <radialGradient id="glow" cx="92%" cy="8%" r="56%">
      <stop offset="0%" stop-color="#e62028" stop-opacity="0.44"/>
      <stop offset="100%" stop-color="#e62028" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="960" height="610" fill="url(#bg)"/>
  <rect width="960" height="610" fill="url(#glow)"/>
  <rect width="960" height="610" fill="url(#grid)"/>
  <rect x="42" y="42" width="876" height="526" rx="28" fill="none" stroke="#ffffff" stroke-opacity="0.09" stroke-width="2"/>
  <rect x="56" y="56" width="18" height="498" rx="9" fill="url(#accent)"/>

  <g transform="translate(98 88)">
    <rect x="0" y="0" width="246" height="36" rx="18" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.16"/>
    <text x="123" y="23" text-anchor="middle" fill="#f7fafc" font-size="14" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" letter-spacing="2.2" font-weight="700">LOCAL EXHAUST SPECIALISTS</text>

    <image href="/media/brand/mufflermen-logo-primary.webp" x="0" y="58" width="430" height="126" preserveAspectRatio="xMinYMid meet"/>

    <text x="0" y="244" fill="#f7fafc" font-size="68" font-family="'Bahnschrift Condensed','Arial Narrow',Arial,sans-serif" letter-spacing="1.2" font-weight="700">EXHAUST</text>
    <text x="0" y="306" fill="#ffc14f" font-size="68" font-family="'Bahnschrift Condensed','Arial Narrow',Arial,sans-serif" letter-spacing="1.2" font-weight="700">PERFORMANCE</text>
    <text x="0" y="368" fill="#40bcff" font-size="68" font-family="'Bahnschrift Condensed','Arial Narrow',Arial,sans-serif" letter-spacing="1.2" font-weight="700">FABRICATION</text>

    <text x="0" y="424" fill="#d9e2ec" font-size="24" font-family="Arial,sans-serif" letter-spacing="0.6">Custom systems, mufflers, 4x4 exhausts, TIG welding, and fitment.</text>
  </g>

  <g transform="translate(612 96)">
    <rect x="0" y="0" width="248" height="308" rx="28" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.12"/>
    <rect x="24" y="24" width="200" height="126" rx="22" fill="#ffffff" fill-opacity="0.04"/>
    <image href="/media/brand/mufflermen-logo-icon-512.webp" x="58" y="38" width="132" height="132" preserveAspectRatio="xMidYMid meet"/>

    <text x="24" y="204" fill="#f7fafc" font-size="18" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" letter-spacing="2.1" font-weight="700">WORKSHOP BOOKINGS</text>
    <text x="24" y="242" fill="#ffc14f" font-size="30" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700">02 4256 3740</text>
    <text x="24" y="276" fill="#40bcff" font-size="20" font-family="Arial,sans-serif">info@oakflatsmufflermen.com.au</text>
    <text x="24" y="308" fill="#d9e2ec" font-size="18" font-family="Arial,sans-serif">mufflermen.com.au</text>
  </g>

  <g transform="translate(98 510)">
    <rect x="0" y="0" width="762" height="48" rx="24" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="28" y="31" fill="#f7fafc" font-size="18" font-family="Arial,sans-serif">Unit 2/8 Shaban St, Albion Park Rail NSW 2527</text>
    <text x="730" y="31" text-anchor="end" fill="#ffc14f" font-size="18" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" letter-spacing="1.4" font-weight="700">PRINT WITH 3MM BLEED</text>
  </g>
</svg>
