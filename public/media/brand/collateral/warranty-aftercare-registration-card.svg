<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Oak Flats Muffler Men warranty and aftercare registration card</title>
  <desc id="desc">Warranty and aftercare registration card for post-fitment follow-up, confirmation, and care reminders.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05070b"/>
      <stop offset="56%" stop-color="#151017"/>
      <stop offset="100%" stop-color="#10161d"/>
    </linearGradient>
    <radialGradient id="glow" cx="100%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#e62028" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#e62028" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e62028"/>
      <stop offset="54%" stop-color="#ffc14f"/>
      <stop offset="100%" stop-color="#40bcff"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>
  <rect x="42" y="42" width="1516" height="816" rx="34" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
  <rect x="42" y="42" width="1516" height="10" rx="5" fill="url(#accent)"/>

  <image href="/media/brand/mufflermen-logo-nav.webp" x="84" y="84" width="340" height="104" preserveAspectRatio="xMinYMid meet"/>
  <text x="86" y="246" fill="#40bcff" font-size="20" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="3">WARRANTY + AFTERCARE REGISTRATION</text>
  <text x="86" y="324" fill="#f7fafc" font-size="72" font-family="'Bahnschrift Condensed','Arial Narrow',Arial,sans-serif" font-weight="700">FITMENT CONFIRMED</text>
  <text x="86" y="380" fill="#d7e0ea" font-size="28" font-family="Arial,sans-serif">Use this card to confirm fitted work, remind the customer of their care steps, and keep the next contact point branded.</text>

  <g transform="translate(86 456)">
    <rect x="0" y="0" width="660" height="314" rx="28" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)"/>
    <text x="28" y="44" fill="#ffc14f" font-size="18" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="2.2">REGISTRATION DETAILS</text>
    <text x="28" y="112" fill="#95a4b5" font-size="15" font-family="Arial,sans-serif" font-weight="700">VEHICLE</text>
    <text x="28" y="146" fill="#ffffff" font-size="30" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700">[MAKE / MODEL / YEAR]</text>
    <text x="28" y="206" fill="#95a4b5" font-size="15" font-family="Arial,sans-serif" font-weight="700">COMPLETED WORK</text>
    <text x="28" y="240" fill="#d7e0ea" font-size="24" font-family="Arial,sans-serif">[FITMENT / EXHAUST / FAB / REPAIR]</text>
    <text x="28" y="294" fill="#95a4b5" font-size="15" font-family="Arial,sans-serif" font-weight="700">FOLLOW-UP DATE</text>
    <text x="28" y="328" fill="#ffffff" font-size="26" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700">[DAY] [DATE]</text>
  </g>

  <g transform="translate(782 456)">
    <rect x="0" y="0" width="730" height="314" rx="28" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)"/>
    <text x="28" y="44" fill="#40bcff" font-size="18" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="2.2">AFTERCARE NOTES</text>
    <text x="28" y="118" fill="#ffffff" font-size="28" font-family="Arial,sans-serif">[Warm-up / re-check / sound-note / return-if-needed instructions]</text>
    <text x="28" y="210" fill="#d7e0ea" font-size="24" font-family="Arial,sans-serif">Reply if you need a follow-up inspection, extra adjustment, or a review link after a few days of driving.</text>
    <text x="28" y="282" fill="#ffc14f" font-size="22" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700" letter-spacing="2">CUSTOM EXHAUST  |  4X4 FITMENT  |  TIG FAB</text>
  </g>

  <text x="86" y="826" fill="#ffc14f" font-size="54" font-family="'Bahnschrift Condensed','Arial Narrow',Arial,sans-serif" font-weight="700">02 4256 3740</text>
  <text x="430" y="826" fill="#ffffff" font-size="28" font-family="'Bahnschrift SemiCondensed','Arial Narrow',Arial,sans-serif" font-weight="700">mufflermen.com.au</text>
</svg>
