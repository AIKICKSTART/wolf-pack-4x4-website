<svg width="1600" height="1200" viewBox="0 0 1600 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="88" x2="1490" y2="1130" gradientUnits="userSpaceOnUse">
      <stop stop-color="#070A0E"/>
      <stop offset="0.55" stop-color="#121922"/>
      <stop offset="1" stop-color="#170D10"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#121921"/>
      <stop offset="1" stop-color="#0A0F14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#E62028"/>
      <stop offset="1" stop-color="#FFC14F"/>
    </linearGradient>
    <filter id="shadow" x="-40" y="-40" width="1680" height="1280" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="26" stdDeviation="28" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .label { font: 700 24px 'Segoe UI', Arial, sans-serif; letter-spacing: 0.16em; text-transform: uppercase; fill: #F5F7FA; }
      .eyebrow { font: 700 14px 'Segoe UI', Arial, sans-serif; letter-spacing: 0.24em; text-transform: uppercase; fill: #FFC14F; }
      .body { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #B4C0CB; }
      .small { font: 600 14px 'Segoe UI', Arial, sans-serif; letter-spacing: 0.1em; text-transform: uppercase; fill: #98A6B3; }
      .field { font: 700 18px 'Segoe UI', Arial, sans-serif; letter-spacing: 0.08em; text-transform: uppercase; fill: #F6F8FB; }
      .chip { font: 700 13px 'Segoe UI', Arial, sans-serif; letter-spacing: 0.12em; text-transform: uppercase; fill: #F6F8FB; }
    </style>
  </defs>

  <rect width="1600" height="1200" rx="40" fill="url(#bg)"/>
  <circle cx="1360" cy="150" r="280" fill="#E62028" opacity="0.1"/>
  <circle cx="132" cy="1078" r="190" fill="#40BCFF" opacity="0.08"/>
  <rect x="68" y="68" width="1464" height="1064" rx="30" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>

  <image href="/media/brand/mufflermen-logo-primary.webp" x="92" y="78" width="308" height="90" preserveAspectRatio="xMidYMid meet"/>
  <text x="92" y="210" class="eyebrow">Operations collateral / courtesy vehicle pack</text>
  <text x="92" y="258" class="label" font-size="42">Service loan-car hang tag set</text>
  <text x="92" y="304" class="body">Ready-to-print mirror hanger, dashboard card, and key tag surfaces for courtesy-car handoff and return clarity.</text>

  <g filter="url(#shadow)">
    <path d="M120 372H438C452.359 372 464 383.641 464 398V1008C464 1022.36 452.359 1034 438 1034H120C105.641 1034 94 1022.36 94 1008V398C94 383.641 105.641 372 120 372Z" fill="url(#panel)"/>
    <path d="M173 372H385V513C385 543.376 360.376 568 330 568H228C197.624 568 173 543.376 173 513V372Z" fill="#10161D"/>
    <circle cx="279" cy="458" r="62" stroke="url(#accent)" stroke-width="18"/>
    <circle cx="279" cy="458" r="26" fill="#06090D"/>
    <rect x="126" y="660" width="306" height="2" fill="url(#accent)"/>
    <text x="130" y="620" class="eyebrow">Mirror hanger</text>
    <text x="130" y="708" class="label" font-size="28">Courtesy car</text>
    <text x="130" y="744" class="body">Use this tag on the mirror when the vehicle is leaving the workshop as a temporary loan or support car.</text>
    <text x="130" y="812" class="small">Driver</text>
    <rect x="130" y="826" width="298" height="44" rx="10" stroke="rgba(255,255,255,0.16)"/>
    <text x="148" y="854" class="field">[customer / driver]</text>
    <text x="130" y="908" class="small">Return window</text>
    <rect x="130" y="922" width="298" height="44" rx="10" stroke="rgba(255,255,255,0.16)"/>
    <text x="148" y="950" class="field">[day / time / contact]</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="522" y="372" width="618" height="662" rx="28" fill="url(#panel)"/>
    <rect x="552" y="402" width="558" height="100" rx="18" fill="#0D1218"/>
    <text x="582" y="438" class="eyebrow">Dashboard card</text>
    <text x="582" y="482" class="label" font-size="30">Thanks for using our courtesy car</text>
    <text x="582" y="548" class="body">Keep the support vehicle instructions visible without handwriting a new sheet each time.</text>

    <rect x="582" y="608" width="468" height="60" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)"/>
    <text x="606" y="646" class="field">[vehicle code] [rego] [fuel level]</text>

    <rect x="582" y="706" width="244" height="168" rx="18" fill="#0C1116" stroke="rgba(255,255,255,0.08)"/>
    <text x="606" y="744" class="small">Driver notes</text>
    <text x="606" y="786" class="body">Call the workshop if you will be late, if the warning lights change, or if the fuel level drops below the handoff mark.</text>

    <rect x="866" y="706" width="244" height="168" rx="18" fill="#0C1116" stroke="rgba(255,255,255,0.08)"/>
    <text x="890" y="744" class="small">Return checks</text>
    <text x="890" y="786" class="body">Keys returned. Personal items removed. Vehicle locked. Staff contacted if parked after hours.</text>

    <rect x="582" y="910" width="156" height="38" rx="19" fill="#E62028"/>
    <text x="608" y="934" class="chip">Call if delayed</text>
    <rect x="756" y="910" width="126" height="38" rx="19" fill="#1A232D" stroke="rgba(255,255,255,0.12)"/>
    <text x="779" y="934" class="chip">No smoking</text>
    <rect x="900" y="910" width="170" height="38" rx="19" fill="#1A232D" stroke="rgba(255,255,255,0.12)"/>
    <text x="925" y="934" class="chip">Return on time</text>
  </g>

  <g filter="url(#shadow)">
    <path d="M1220 398C1220 383.641 1231.64 372 1246 372H1430C1444.36 372 1456 383.641 1456 398V1010C1456 1024.36 1444.36 1036 1430 1036H1246C1231.64 1036 1220 1024.36 1220 1010V398Z" fill="url(#panel)"/>
    <circle cx="1338" cy="446" r="24" fill="#0B1014" stroke="url(#accent)" stroke-width="8"/>
    <text x="1254" y="526" class="eyebrow">Key tag</text>
    <text x="1254" y="580" class="label" font-size="28">Loan car</text>
    <rect x="1254" y="626" width="168" height="62" rx="14" fill="#0B1014" stroke="rgba(255,255,255,0.14)"/>
    <text x="1280" y="666" class="field">[car 03]</text>
    <text x="1254" y="746" class="small">Registration</text>
    <rect x="1254" y="760" width="168" height="44" rx="10" stroke="rgba(255,255,255,0.16)"/>
    <text x="1272" y="788" class="field">[rego]</text>
    <text x="1254" y="852" class="small">Return contact</text>
    <rect x="1254" y="866" width="168" height="44" rx="10" stroke="rgba(255,255,255,0.16)"/>
    <text x="1272" y="894" class="field">[phone]</text>
    <text x="1254" y="964" class="body">Attach to the loan-car key ring or drop-safe envelope so the same contact detail follows the vehicle.</text>
  </g>

  <rect x="92" y="1080" width="1416" height="2" fill="url(#accent)"/>
  <text x="92" y="1116" class="small">Oak Flats Muffler Men  /  02 4256 3740  /  0411 844 062  /  info@oakflatsmufflermen.com.au  /  mufflermen.com.au</text>
</svg>
