<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">Cargo Work Pants BACK Wolfpack concept</title>
  <desc id="desc">Stretch work pants with reinforced knees and blue internal pocket detail.</desc>
  <defs>
    <radialGradient id="stage" cx="50%" cy="42%" r="58%">
      <stop offset="0%" stop-color="#1e2638"/>
      <stop offset="48%" stop-color="#080b12"/>
      <stop offset="100%" stop-color="#030407"/>
    </radialGradient>
    <linearGradient id="fabric" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111724"/>
      <stop offset="45%" stop-color="#05070c"/>
      <stop offset="100%" stop-color="#151b29"/>
    </linearGradient>
    <linearGradient id="slash" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#008cff"/>
      <stop offset="52%" stop-color="#202bff"/>
      <stop offset="100%" stop-color="#7c2cff"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#008cff" flood-opacity=".42"/>
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity=".46"/>
    </filter>
    <style>
      .mark{font-family:Arial Black,Impact,sans-serif;font-size:58px;letter-spacing:3px;fill:#eef5ff;paint-order:stroke;stroke:#020306;stroke-width:8px}
      .smallmark{font-family:Arial Black,Impact,sans-serif;font-size:35px;letter-spacing:5px;fill:#eef5ff;paint-order:stroke;stroke:#020306;stroke-width:5px}
      .meta{font-family:Consolas,Monaco,monospace;font-size:24px;letter-spacing:6px;fill:#aeb9cf}
      .name{font-family:Arial Black,Impact,sans-serif;font-size:34px;letter-spacing:1px;fill:#f3f6fb}
      .tiny{font-family:Arial Black,Impact,sans-serif;font-size:22px;letter-spacing:2px;fill:#edf5ff}
      .tinyBlue{font-family:Consolas,Monaco,monospace;font-size:18px;letter-spacing:4px;fill:#008cff}
      .micro{font-family:Consolas,Monaco,monospace;font-size:15px;letter-spacing:4px;font-weight:700}
    </style>
  </defs>
  <rect width="1200" height="1200" fill="url(#stage)"/>
  <circle cx="600" cy="610" r="410" fill="#008cff" opacity=".09" filter="url(#glow)"/>
  <circle cx="805" cy="360" r="210" fill="#7c2cff" opacity=".13" filter="url(#glow)"/>
  <path d="M132 942 C320 876 452 850 600 850 C748 850 880 876 1068 942" fill="none" stroke="url(#slash)" stroke-width="8" opacity=".52"/>
  
    <g opacity=".96">
      <path d="M-140 1030 L300 90" stroke="url(#slash)" stroke-width="12" opacity=".13"/><path d="M10 1030 L450 90" stroke="url(#slash)" stroke-width="12" opacity=".13"/><path d="M160 1030 L600 90" stroke="url(#slash)" stroke-width="12" opacity=".13"/><path d="M310 1030 L750 90" stroke="url(#slash)" stroke-width="12" opacity=".13"/><path d="M460 1030 L900 90" stroke="url(#slash)" stroke-width="12" opacity=".13"/><path d="M610 1030 L1050 90" stroke="url(#slash)" stroke-width="12" opacity=".13"/><path d="M760 1030 L1200 90" stroke="url(#slash)" stroke-width="12" opacity=".13"/><path d="M910 1030 L1350 90" stroke="url(#slash)" stroke-width="12" opacity=".13"/><path d="M1060 1030 L1500 90" stroke="url(#slash)" stroke-width="12" opacity=".13"/><path d="M1210 1030 L1650 90" stroke="url(#slash)" stroke-width="12" opacity=".13"/>
      <g transform="translate(1020 235) scale(0.62)" opacity="0.34" filter="url(#softGlow)"><path d="M-78 -48 H78 L100 -18 V58 L70 84 H-70 L-100 58 V-18Z" fill="#06080d" stroke="#008cff" stroke-width="8"/><circle cx="-48" cy="-12" r="10" fill="#7c2cff"/><circle cx="48" cy="-12" r="10" fill="#7c2cff"/><path d="M-42 40 H42" stroke="#eef5ff" stroke-width="10" stroke-linecap="round"/></g>
      <g transform="translate(184 830) scale(0.5)" opacity="0.26" filter="url(#softGlow)"><path d="M-78 -48 H78 L100 -18 V58 L70 84 H-70 L-100 58 V-18Z" fill="#06080d" stroke="#008cff" stroke-width="8"/><circle cx="-48" cy="-12" r="10" fill="#7c2cff"/><circle cx="48" cy="-12" r="10" fill="#7c2cff"/><path d="M-42 40 H42" stroke="#eef5ff" stroke-width="10" stroke-linecap="round"/></g>
      <path d="M90 465 H1110" stroke="url(#slash)" stroke-width="6" opacity=".34"/>
      <text x="118" y="1012" class="micro" fill="#008cff">APPAREL</text><text x="336" y="1050" class="micro" fill="#7c2cff">PANTS</text><text x="554" y="1012" class="micro" fill="#008cff">PACK-92</text><text x="772" y="1050" class="micro" fill="#7c2cff">FORGE</text><text x="990" y="1012" class="micro" fill="#008cff">BACK</text>
    </g>
  
      <g transform="">
        <path d="M420 260 H780 L820 940 Q715 970 630 940 L600 500 L570 940 Q485 970 380 940 Z" fill="url(#fabric)" stroke="#242b38" stroke-width="9" />
        <path d="M420 355 H780" stroke="#008cff" stroke-width="16" />
        <path d="M486 470 H562 V650 H470 Z" fill="#090d15" stroke="#7c2cff" stroke-width="6" />
        <path d="M638 470 H714 V650 H622 Z" fill="#090d15" stroke="#008cff" stroke-width="6" />
        <text x="600" y="330" text-anchor="middle" class="smallmark">WOLFPACK</text>
      </g>
  
    <g transform="translate(730.5 300) rotate(1.44)">
      <rect x="-146" y="-48" width="292" height="96" rx="10" fill="#030407" stroke="url(#slash)" stroke-width="4" opacity=".82"/>
      <g transform="translate(-106 0) scale(0.26)" opacity="1" filter="url(#softGlow)"><path d="M-78 -48 H78 L100 -18 V58 L70 84 H-70 L-100 58 V-18Z" fill="#06080d" stroke="#008cff" stroke-width="8"/><circle cx="-48" cy="-12" r="10" fill="#7c2cff"/><circle cx="48" cy="-12" r="10" fill="#7c2cff"/><path d="M-42 40 H42" stroke="#eef5ff" stroke-width="10" stroke-linecap="round"/></g>
      <text x="-28" y="-8" class="tiny" fill="#eef5ff">BACK PRINT</text>
      <text x="-28" y="28" class="tinyBlue">PACK ISSUE 92</text>
    </g>
    <g transform="translate(600 926)">
      <rect x="-330" y="-48" width="660" height="72" rx="8" fill="#05070b" stroke="#263247" stroke-width="3" opacity=".88"/>
      <text x="0" y="-4" text-anchor="middle" class="tiny">BLACK CARGO WORK PANTS WITH ...</text>
      <text x="0" y="28" text-anchor="middle" class="tinyBlue">WOLFPACK 4X4 / BUILD / ISSUE 92</text>
    </g>
  <g>
    <rect x="82" y="82" width="244" height="62" rx="8" fill="#05070b" stroke="#008cff" stroke-width="3" opacity=".95"/>
    <text x="204" y="122" text-anchor="middle" class="meta">BACK</text>
    <text x="600" y="1072" text-anchor="middle" class="name">CARGO WORK PANTS</text>
    <text x="600" y="1114" text-anchor="middle" class="meta">APPAREL - WOLFPACK 4X4</text>
  </g>
</svg>
