      <g transform="translate(1020 235) scale(0.62)" opacity="0.34" filter="url(#softGlow)"><path d="M0 -86 C68 -20 84 42 28 84 C-34 118 -100 42 -34 -18 C-18 -34 -18 -62 0 -86Z" fill="#7c2cff" stroke="#008cff" stroke-width="8"/><path d="M0 -18 C32 18 32 50 2 66 C-28 48 -22 18 0 -18Z" fill="#05070c"/></g>
      <g transform="translate(184 830) scale(0.5)" opacity="0.26" filter="url(#softGlow)"><path d="M0 -86 C68 -20 84 42 28 84 C-34 118 -100 42 -34 -18 C-18 -34 -18 -62 0 -86Z" fill="#7c2cff" stroke="#008cff" stroke-width="8"/><path d="M0 -18 C32 18 32 50 2 66 C-28 48 -22 18 0 -18Z" fill="#05070c"/></g>
      <path d="M90 466 H1110" stroke="url(#slash)" stroke-width="6" opacity=".34"/>
      <text x="118" y="1012" class="micro" fill="#008cff">APPAREL</text><text x="336" y="1050" class="micro" fill="#7c2cff">ZIP HOODIE</text><text x="554" y="1012" class="micro" fill="#008cff">PACK-38</text><text x="772" y="1050" class="micro" fill="#7c2cff">CAMP</text><text x="990" y="1012" class="micro" fill="#008cff">SIDE</text>
    </g>
  
      <g transform="translate(95 0) scale(0.82 1)">
        <path d="M440 255 Q600 120 760 255 L820 860 Q600 942 380 860 Z" fill="#06070b" stroke="#1f2634" stroke-width="9" />
        <path d="M420 300 L245 640 L330 700 L438 495" fill="#07090e" stroke="#008cff" stroke-width="7" />
        <path d="M780 300 L955 640 L870 700 L762 495" fill="#07090e" stroke="#7c2cff" stroke-width="7" />
        <path d="M495 270 Q600 355 705 270 L690 420 Q600 485 510 420Z" fill="#090d15" stroke="#293345" stroke-width="7" />
        <path d="M600 345 V880" stroke="#008cff" stroke-width="9" />
        
        <path d="M410 555 Q600 645 790 555" fill="none" stroke="url(#slash)" stroke-width="22" opacity=".78" />
        <text x="600" y="548" text-anchor="middle" class="mark">WOLFPACK</text>
      </g>
  
    <g transform="translate(722.6 300) rotate(3.42)">
      <rect x="-146" y="-48" width="292" height="96" rx="10" fill="#030407" stroke="url(#slash)" stroke-width="4" opacity=".82"/>
      <g transform="translate(-106 0) scale(0.26)" opacity="1" filter="url(#softGlow)"><path d="M0 -86 C68 -20 84 42 28 84 C-34 118 -100 42 -34 -18 C-18 -34 -18 -62 0 -86Z" fill="#7c2cff" stroke="#008cff" stroke-width="8"/><path d="M0 -18 C32 18 32 50 2 66 C-28 48 -22 18 0 -18Z" fill="#05070c"/></g>
      <text x="-28" y="-8" class="tiny" fill="#eef5ff">SIDE PROFILE</text>
      <text x="-28" y="28" class="tinyBlue">FITMENT READY 38</text>
    </g>
    <g transform="translate(600 926)">
      <rect x="-330" y="-48" width="660" height="72" rx="8" fill="#05070b" stroke="#263247" stroke-width="3" opacity=".88"/>
      <text x="0" y="-4" text-anchor="middle" class="tiny">ZIP HOODIE WITH CONTRAST ZIP...</text>
      <text x="0" y="28" text-anchor="middle" class="tinyBlue">WOLFPACK 4X4 / BASE / ISSUE 38</text>
    </g>
  <g>
