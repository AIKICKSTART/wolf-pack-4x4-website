      <g transform="translate(1020 235) scale(0.62)" opacity="0.34" filter="url(#softGlow)"><circle cx="0" cy="0" r="84" fill="#06080d" stroke="#008cff" stroke-width="8"/><path d="M0 -70 L25 20 L0 70 L-25 20Z" fill="#7c2cff" stroke="#eef5ff" stroke-width="5"/><path d="M-70 0 H70 M0 -70 V70" stroke="#008cff" stroke-width="5" opacity=".7"/></g>
      <g transform="translate(184 830) scale(0.5)" opacity="0.26" filter="url(#softGlow)"><circle cx="0" cy="0" r="84" fill="#06080d" stroke="#008cff" stroke-width="8"/><path d="M0 -70 L25 20 L0 70 L-25 20Z" fill="#7c2cff" stroke="#eef5ff" stroke-width="5"/><path d="M-70 0 H70 M0 -70 V70" stroke="#008cff" stroke-width="5" opacity=".7"/></g>
      <path d="M90 576 H1110" stroke="url(#slash)" stroke-width="6" opacity=".34"/>
      <text x="118" y="1012" class="micro" fill="#008cff">APPAREL</text><text x="336" y="1050" class="micro" fill="#7c2cff">GAITER</text><text x="554" y="1012" class="micro" fill="#008cff">PACK-27</text><text x="772" y="1050" class="micro" fill="#7c2cff">TOURING</text><text x="990" y="1012" class="micro" fill="#008cff">DETAIL</text>
    </g>
  
      <g transform="">
        <path d="M355 270 H525 V705 Q525 835 405 835 H285 Q245 790 300 735 L355 680Z" fill="url(#fabric)" stroke="#242b38" stroke-width="8" />
        <path d="M675 270 H845 V705 Q845 835 725 835 H605 Q565 790 620 735 L675 680Z" fill="url(#fabric)" stroke="#242b38" stroke-width="8" />
        <path d="M355 660 H525" stroke="#008cff" stroke-width="18" />
        <path d="M675 660 H845" stroke="#7c2cff" stroke-width="18" />
        <text x="600" y="530" text-anchor="middle" class="mark">PACK</text>
      </g>
  
    <g transform="translate(728.6 260) rotate(0.54)">
      <rect x="-146" y="-48" width="292" height="96" rx="10" fill="#030407" stroke="url(#slash)" stroke-width="4" opacity=".82"/>
      <g transform="translate(-106 0) scale(0.26)" opacity="1" filter="url(#softGlow)"><circle cx="0" cy="0" r="84" fill="#06080d" stroke="#008cff" stroke-width="8"/><path d="M0 -70 L25 20 L0 70 L-25 20Z" fill="#7c2cff" stroke="#eef5ff" stroke-width="5"/><path d="M-70 0 H70 M0 -70 V70" stroke="#008cff" stroke-width="5" opacity=".7"/></g>
      <text x="-28" y="-8" class="tiny" fill="#eef5ff">DETAIL VIEW</text>
      <text x="-28" y="28" class="tinyBlue">MATERIAL CALL 27</text>
    </g>
