      <g transform="translate(184 830) scale(0.5)" opacity="0.26" filter="url(#softGlow)"><path d="M-42 -72 C38 -52 62 8 28 56 C4 90 -56 74 -50 22" fill="none" stroke="#008cff" stroke-width="18" stroke-linecap="round"/><path d="M-70 -20 L-30 28 L-2 -34" fill="none" stroke="#7c2cff" stroke-width="12" stroke-linecap="round"/></g>
      <path d="M90 540 H1110" stroke="url(#slash)" stroke-width="6" opacity=".34"/>
      <text x="118" y="1012" class="micro" fill="#008cff">APPAREL</text><text x="336" y="1050" class="micro" fill="#7c2cff">SHORTS</text><text x="554" y="1012" class="micro" fill="#008cff">PACK-90</text><text x="772" y="1050" class="micro" fill="#7c2cff">RECOVERY</text><text x="990" y="1012" class="micro" fill="#008cff">SIDE</text>
    </g>
  
      <g transform="translate(95 0) scale(0.82 1)">
        <path d="M420 260 H780 L820 720 Q715 750 630 720 L600 500 L570 720 Q485 750 380 720 Z" fill="url(#fabric)" stroke="#242b38" stroke-width="9" />
        <path d="M420 355 H780" stroke="#008cff" stroke-width="16" />
        <path d="M486 470 H562 V650 H470 Z" fill="#090d15" stroke="#7c2cff" stroke-width="6" />
        <path d="M638 470 H714 V650 H622 Z" fill="#090d15" stroke="#008cff" stroke-width="6" />
        <text x="600" y="330" text-anchor="middle" class="smallmark">WOLFPACK</text>
      </g>
  
    <g transform="translate(719 300) rotate(0.8999999999999999)">
