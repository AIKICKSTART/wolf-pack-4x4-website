      <text x="0" y="28" text-anchor="middle" class="tinyBlue">WOLFPACK 4X4 / PULL / ISSUE 90</text>
    </g>
  <g>
    <rect x="82" y="82" width="244" height="62" rx="8" fill="#05070b" stroke="#008cff" stroke-width="3" opacity=".95"/>
    <text x="204" y="122" text-anchor="middle" class="meta">SIDE</text>
    <text x="600" y="1072" text-anchor="middle" class="name">TRAIL SHORTS</text>
    <text x="600" y="1114" text-anchor="middle" class="meta">APPAREL - WOLFPACK 4X4</text>
