      <g transform="translate(1020 235) scale(0.62)" opacity="0.34" filter="url(#softGlow)"><path d="M-64 -66 C34 -104 34 -36 -42 -48 C-118 -60 -104 8 -18 -8 C68 -24 72 46 -28 32 C-112 20 -112 84 -10 62 C52 48 80 70 90 92" fill="none" stroke="#16a4ff" stroke-width="13" stroke-linecap="round"/><path d="M36 -72 L74 72" stroke="#7d34ff" stroke-width="10" stroke-linecap="round"/></g>
      <g transform="translate(184 830) scale(0.5)" opacity="0.26" filter="url(#softGlow)"><path d="M-64 -66 C34 -104 34 -36 -42 -48 C-118 -60 -104 8 -18 -8 C68 -24 72 46 -28 32 C-112 20 -112 84 -10 62 C52 48 80 70 90 92" fill="none" stroke="#16a4ff" stroke-width="13" stroke-linecap="round"/><path d="M36 -72 L74 72" stroke="#7d34ff" stroke-width="10" stroke-linecap="round"/></g>
      <path d="M90 572 H1110" stroke="url(#slash)" stroke-width="6" opacity=".34"/>
      <text x="118" y="1012" class="micro" fill="#16a4ff">TOURING STORAGE</text><text x="336" y="1050" class="micro" fill="#7d34ff">RACK</text><text x="554" y="1012" class="micro" fill="#16a4ff">PACK-59</text><text x="772" y="1050" class="micro" fill="#7d34ff">PAYLOAD</text><text x="990" y="1012" class="micro" fill="#16a4ff">SIDE</text>
    </g>
  
      <g transform="translate(95 0) scale(0.82 1)">
