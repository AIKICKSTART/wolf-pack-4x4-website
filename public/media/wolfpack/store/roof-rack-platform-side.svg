        <path d="M315 455 L270 720" stroke="#16a4ff" stroke-width="12" stroke-linecap="round"/><path d="M431 455 L386 720" stroke="#7d34ff" stroke-width="12" stroke-linecap="round"/><path d="M547 455 L502 720" stroke="#16a4ff" stroke-width="12" stroke-linecap="round"/><path d="M663 455 L618 720" stroke="#7d34ff" stroke-width="12" stroke-linecap="round"/><path d="M779 455 L734 720" stroke="#16a4ff" stroke-width="12" stroke-linecap="round"/><path d="M895 455 L850 720" stroke="#7d34ff" stroke-width="12" stroke-linecap="round"/>
