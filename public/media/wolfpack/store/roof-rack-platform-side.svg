        <rect x="420" y="720" width="360" height="92" rx="18" fill="#080b12" stroke="url(#slash)" stroke-width="8"/>
        <text x="600" y="782" text-anchor="middle" class="smallmark">TOURING</text>
      </g>
  
    <g transform="translate(727.2 300) rotate(1.98)">
      <rect x="-146" y="-48" width="292" height="96" rx="10" fill="#030407" stroke="url(#slash)" stroke-width="4" opacity=".82"/>
      <g transform="translate(-106 0) scale(0.26)" opacity="1" filter="url(#softGlow)"><path d="M-64 -66 C34 -104 34 -36 -42 -48 C-118 -60 -104 8 -18 -8 C68 -24 72 46 -28 32 C-112 20 -112 84 -10 62 C52 48 80 70 90 92" fill="none" stroke="#16a4ff" stroke-width="13" stroke-linecap="round"/><path d="M36 -72 L74 72" stroke="#7d34ff" stroke-width="10" stroke-linecap="round"/></g>
      <text x="-28" y="-8" class="tiny" fill="#eef5ff">SIDE PROFILE</text>
      <text x="-28" y="28" class="tinyBlue">FITMENT READY 59</text>
