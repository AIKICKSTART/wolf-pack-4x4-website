<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">Wolfpack Bull Bar Concept FRONT Wolfpack concept</title>
  <desc id="desc">Aggressive steel bull bar concept with integrated lighting and bash plate language.</desc>
  <defs>
    <radialGradient id="stage" cx="50%" cy="42%" r="58%">
      <stop offset="0%" stop-color="#1e2638"/>
      <stop offset="48%" stop-color="#080b12"/>
      <stop offset="100%" stop-color="#030407"/>
    </radialGradient>
    <linearGradient id="fabric" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111724"/>
      <stop offset="45%" stop-color="#05070c"/>
      <stop offset="100%" stop-color="#151b29"/>
    </linearGradient>
    <linearGradient id="slash" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#008cff"/>
      <stop offset="52%" stop-color="#202bff"/>
      <stop offset="100%" stop-color="#5928ff"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#008cff" flood-opacity=".42"/>
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity=".46"/>
    </filter>
    <style>
      .mark{font-family:Arial Black,Impact,sans-serif;font-size:58px;letter-spacing:3px;fill:#eef5ff;paint-order:stroke;stroke:#020306;stroke-width:8px}
      .smallmark{font-family:Arial Black,Impact,sans-serif;font-size:35px;letter-spacing:5px;fill:#eef5ff;paint-order:stroke;stroke:#020306;stroke-width:5px}
      .meta{font-family:Consolas,Monaco,monospace;font-size:24px;letter-spacing:6px;fill:#aeb9cf}
      .name{font-family:Arial Black,Impact,sans-serif;font-size:34px;letter-spacing:1px;fill:#f3f6fb}
      .tiny{font-family:Arial Black,Impact,sans-serif;font-size:22px;letter-spacing:2px;fill:#edf5ff}
      .tinyBlue{font-family:Consolas,Monaco,monospace;font-size:18px;letter-spacing:4px;fill:#008cff}
      .micro{font-family:Consolas,Monaco,monospace;font-size:15px;letter-spacing:4px;font-weight:700}
    </style>
  </defs>
  <rect width="1200" height="1200" fill="url(#stage)"/>
  <circle cx="600" cy="610" r="410" fill="#008cff" opacity=".09" filter="url(#glow)"/>
  <circle cx="805" cy="360" r="210" fill="#5928ff" opacity=".13" filter="url(#glow)"/>
  <path d="M132 942 C320 876 452 850 600 850 C748 850 880 876 1068 942" fill="none" stroke="url(#slash)" stroke-width="8" opacity=".52"/>
  
    <g opacity=".96">
      <path d="M-120 220 L60 560 L-120 900" fill="none" stroke="url(#slash)" stroke-width="18" opacity=".12"/><path d="M100 220 L280 560 L100 900" fill="none" stroke="url(#slash)" stroke-width="18" opacity=".12"/><path d="M320 220 L500 560 L320 900" fill="none" stroke="url(#slash)" stroke-width="18" opacity=".12"/><path d="M540 220 L720 560 L540 900" fill="none" stroke="url(#slash)" stroke-width="18" opacity=".12"/><path d="M760 220 L940 560 L760 900" fill="none" stroke="url(#slash)" stroke-width="18" opacity=".12"/><path d="M980 220 L1160 560 L980 900" fill="none" stroke="url(#slash)" stroke-width="18" opacity=".12"/><path d="M1200 220 L1380 560 L1200 900" fill="none" stroke="url(#slash)" stroke-width="18" opacity=".12"/><path d="M1420 220 L1600 560 L1420 900" fill="none" stroke="url(#slash)" stroke-width="18" opacity=".12"/>
      <g transform="translate(1020 235) scale(0.62)" opacity="0.34" filter="url(#softGlow)"><path d="M0 -74 L50 -28 L72 42 L28 74 L0 48 L-28 74 L-72 42 L-50 -28Z" fill="#05070c" stroke="#008cff" stroke-width="9"/><path d="M-34 -8 L-10 10 L-24 22 M34 -8 L10 10 L24 22" fill="none" stroke="#5928ff" stroke-width="8" stroke-linecap="round"/><path d="M-18 38 L0 52 L18 38" fill="none" stroke="#f1f6ff" stroke-width="7" stroke-linecap="round"/></g>
      <g transform="translate(184 830) scale(0.5)" opacity="0.26" filter="url(#softGlow)"><path d="M0 -74 L50 -28 L72 42 L28 74 L0 48 L-28 74 L-72 42 L-50 -28Z" fill="#05070c" stroke="#008cff" stroke-width="9"/><path d="M-34 -8 L-10 10 L-24 22 M34 -8 L10 10 L24 22" fill="none" stroke="#5928ff" stroke-width="8" stroke-linecap="round"/><path d="M-18 38 L0 52 L18 38" fill="none" stroke="#f1f6ff" stroke-width="7" stroke-linecap="round"/></g>
      <path d="M90 500 H1110" stroke="url(#slash)" stroke-width="6" opacity=".34"/>
      <text x="118" y="1012" class="micro" fill="#008cff">PROTECTION</text><text x="336" y="1050" class="micro" fill="#5928ff">BULL BAR</text><text x="554" y="1012" class="micro" fill="#008cff">PACK-31</text><text x="772" y="1050" class="micro" fill="#5928ff">ALPHA</text><text x="990" y="1012" class="micro" fill="#008cff">FRONT</text>
    </g>
  
      <g transform="">
        <path d="M250 455 Q600 315 950 455 V690 Q600 850 250 690Z" fill="#05070c" stroke="#242b38" stroke-width="12"/>
        <path d="M300 520 H900 M360 455 V740 M840 455 V740" stroke="#008cff" stroke-width="22" stroke-linecap="round"/>
        <path d="M250 690 H950" stroke="#5928ff" stroke-width="24" stroke-linecap="round"/>
        <rect x="440" y="558" width="320" height="72" rx="12" fill="#101723" stroke="url(#slash)" stroke-width="7"/>
        <circle cx="380" cy="725" r="32" fill="none" stroke="#5928ff" stroke-width="14"/>
        <circle cx="820" cy="725" r="32" fill="none" stroke="#5928ff" stroke-width="14"/>
        <text x="600" y="615" text-anchor="middle" class="smallmark">WOLFPACK 4X4</text>
      </g>
  
    <g transform="translate(730 300) rotate(-1.6199999999999999)">
      <rect x="-146" y="-48" width="292" height="96" rx="10" fill="#030407" stroke="url(#slash)" stroke-width="4" opacity=".82"/>
      <g transform="translate(-106 0) scale(0.26)" opacity="1" filter="url(#softGlow)"><path d="M0 -74 L50 -28 L72 42 L28 74 L0 48 L-28 74 L-72 42 L-50 -28Z" fill="#05070c" stroke="#008cff" stroke-width="9"/><path d="M-34 -8 L-10 10 L-24 22 M34 -8 L10 10 L24 22" fill="none" stroke="#5928ff" stroke-width="8" stroke-linecap="round"/><path d="M-18 38 L0 52 L18 38" fill="none" stroke="#f1f6ff" stroke-width="7" stroke-linecap="round"/></g>
      <text x="-28" y="-8" class="tiny" fill="#eef5ff">FRONT CREST</text>
      <text x="-28" y="28" class="tinyBlue">CUSTOM DROP 31</text>
    </g>
    <g transform="translate(600 926)">
      <rect x="-330" y="-48" width="660" height="72" rx="8" fill="#05070b" stroke="#263247" stroke-width="3" opacity=".88"/>
      <text x="0" y="-4" text-anchor="middle" class="tiny">BLACK 4X4 BULL BAR WITH BLUE...</text>
      <text x="0" y="28" text-anchor="middle" class="tinyBlue">WOLFPACK 4X4 / LEAD / ISSUE 31</text>
    </g>
  <g>
    <rect x="82" y="82" width="244" height="62" rx="8" fill="#05070b" stroke="#008cff" stroke-width="3" opacity=".95"/>
    <text x="204" y="122" text-anchor="middle" class="meta">FRONT</text>
    <text x="600" y="1072" text-anchor="middle" class="name">WOLFPACK BULL BAR CONCEPT</text>
    <text x="600" y="1114" text-anchor="middle" class="meta">PROTECTION - WOLFPACK 4X4</text>
  </g>
</svg>
