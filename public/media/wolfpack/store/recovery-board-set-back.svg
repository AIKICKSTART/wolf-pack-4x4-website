      <g transform="translate(1020 235) scale(0.62)" opacity="0.34" filter="url(#softGlow)"><rect x="-86" y="-42" width="172" height="84" rx="20" fill="#05070c" stroke="#169bff" stroke-width="8"/><circle cx="-42" cy="0" r="18" fill="#5d33f6"/><circle cx="0" cy="0" r="18" fill="#169bff"/><circle cx="42" cy="0" r="18" fill="#5d33f6"/><path d="M96 -26 L156 -52 M96 0 H166 M96 26 L156 52" stroke="#169bff" stroke-width="8" stroke-linecap="round"/></g>
