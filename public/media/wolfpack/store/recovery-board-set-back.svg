        <path d="M505 260 L960 380 L842 875 L388 760Z" fill="#05070c" stroke="#242b38" stroke-width="9" opacity=".92"/>
        <path d="M560 390 l38 10 l-18 76 l-38 -10Z" fill="#5d33f6" opacity=".9"/><path d="M608 400 l38 10 l-18 76 l-38 -10Z" fill="#169bff" opacity=".9"/><path d="M656 410 l38 10 l-18 76 l-38 -10Z" fill="#5d33f6" opacity=".9"/><path d="M704 420 l38 10 l-18 76 l-38 -10Z" fill="#169bff" opacity=".9"/><path d="M752 430 l38 10 l-18 76 l-38 -10Z" fill="#5d33f6" opacity=".9"/><path d="M800 440 l38 10 l-18 76 l-38 -10Z" fill="#169bff" opacity=".9"/><path d="M848 450 l38 10 l-18 76 l-38 -10Z" fill="#5d33f6" opacity=".9"/>
        <text x="600" y="630" text-anchor="middle" class="mark">WOLFPACK</text>
      </g>
  
    <g transform="translate(731.1 300) rotate(-0.36)">
      <rect x="-146" y="-48" width="292" height="96" rx="10" fill="#030407" stroke="url(#slash)" stroke-width="4" opacity=".82"/>
      <g transform="translate(-106 0) scale(0.26)" opacity="1" filter="url(#softGlow)"><rect x="-86" y="-42" width="172" height="84" rx="20" fill="#05070c" stroke="#169bff" stroke-width="8"/><circle cx="-42" cy="0" r="18" fill="#5d33f6"/><circle cx="0" cy="0" r="18" fill="#169bff"/><circle cx="42" cy="0" r="18" fill="#5d33f6"/><path d="M96 -26 L156 -52 M96 0 H166 M96 26 L156 52" stroke="#169bff" stroke-width="8" stroke-linecap="round"/></g>
      <text x="-28" y="-8" class="tiny" fill="#eef5ff">BACK PRINT</text>
      <text x="-28" y="28" class="tinyBlue">PACK ISSUE 13</text>
    </g>
    <g transform="translate(600 926)">
