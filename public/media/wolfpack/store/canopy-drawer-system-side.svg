      <g transform="translate(184 830) scale(0.5)" opacity="0.26" filter="url(#softGlow)"><circle cx="0" cy="0" r="84" fill="#06080d" stroke="#16a4ff" stroke-width="8"/><path d="M0 -70 L25 20 L0 70 L-25 20Z" fill="#7d34ff" stroke="#eef5ff" stroke-width="5"/><path d="M-70 0 H70 M0 -70 V70" stroke="#16a4ff" stroke-width="5" opacity=".7"/></g>
      <path d="M90 518 H1110" stroke="url(#slash)" stroke-width="6" opacity=".34"/>
      <text x="118" y="1012" class="micro" fill="#16a4ff">TOURING STORAGE</text><text x="336" y="1050" class="micro" fill="#7d34ff">STORAGE</text><text x="554" y="1012" class="micro" fill="#16a4ff">PACK-49</text><text x="772" y="1050" class="micro" fill="#7d34ff">TOURING</text><text x="990" y="1012" class="micro" fill="#16a4ff">SIDE</text>
    </g>
  
      <g transform="translate(95 0) scale(0.82 1)">
        <path d="M230 455 H970 L880 720 H320Z" fill="#05070c" stroke="#242b38" stroke-width="10"/>
        <path d="M315 455 L270 720" stroke="#16a4ff" stroke-width="12" stroke-linecap="round"/><path d="M431 455 L386 720" stroke="#7d34ff" stroke-width="12" stroke-linecap="round"/><path d="M547 455 L502 720" stroke="#16a4ff" stroke-width="12" stroke-linecap="round"/><path d="M663 455 L618 720" stroke="#7d34ff" stroke-width="12" stroke-linecap="round"/><path d="M779 455 L734 720" stroke="#16a4ff" stroke-width="12" stroke-linecap="round"/><path d="M895 455 L850 720" stroke="#7d34ff" stroke-width="12" stroke-linecap="round"/>
        <path d="M300 545 H900 M350 635 H850" stroke="#151c29" stroke-width="28" stroke-linecap="round"/>
        <rect x="420" y="720" width="360" height="92" rx="18" fill="#080b12" stroke="url(#slash)" stroke-width="8"/>
        <text x="600" y="782" text-anchor="middle" class="smallmark">TOURING</text>
      </g>
  
    <g transform="translate(719.8 300) rotate(0.54)">
      <rect x="-146" y="-48" width="292" height="96" rx="10" fill="#030407" stroke="url(#slash)" stroke-width="4" opacity=".82"/>
      <g transform="translate(-106 0) scale(0.26)" opacity="1" filter="url(#softGlow)"><circle cx="0" cy="0" r="84" fill="#06080d" stroke="#16a4ff" stroke-width="8"/><path d="M0 -70 L25 20 L0 70 L-25 20Z" fill="#7d34ff" stroke="#eef5ff" stroke-width="5"/><path d="M-70 0 H70 M0 -70 V70" stroke="#16a4ff" stroke-width="5" opacity=".7"/></g>
      <text x="-28" y="-8" class="tiny" fill="#eef5ff">SIDE PROFILE</text>
