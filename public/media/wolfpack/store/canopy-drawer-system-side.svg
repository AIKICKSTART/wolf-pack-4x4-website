    </g>
  <g>
    <rect x="82" y="82" width="244" height="62" rx="8" fill="#05070b" stroke="#16a4ff" stroke-width="3" opacity=".95"/>
    <text x="204" y="122" text-anchor="middle" class="meta">SIDE</text>
    <text x="600" y="1072" text-anchor="middle" class="name">CANOPY DRAWER SYSTEM</text>
    <text x="600" y="1114" text-anchor="middle" class="meta">TOURING STORAGE - WOLFPACK 4X4</text>
