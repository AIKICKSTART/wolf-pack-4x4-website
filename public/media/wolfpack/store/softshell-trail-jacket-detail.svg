      <g transform="translate(1020 235) scale(0.62)" opacity="0.34" filter="url(#softGlow)"><path d="M-96 20 C-58 -38 -12 -38 26 20 C48 54 76 54 98 18" fill="none" stroke="#008cff" stroke-width="15" stroke-linecap="round"/><path d="M-86 54 C-48 8 -18 8 18 54 C42 82 72 82 96 52" fill="none" stroke="#7c2cff" stroke-width="11" stroke-linecap="round"/></g>
