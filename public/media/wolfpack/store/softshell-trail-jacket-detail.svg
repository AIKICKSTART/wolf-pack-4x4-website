      <path d="M90 442 H1110" stroke="url(#slash)" stroke-width="6" opacity=".34"/>
      <text x="118" y="1012" class="micro" fill="#008cff">APPAREL</text><text x="336" y="1050" class="micro" fill="#7c2cff">JACKET</text><text x="554" y="1012" class="micro" fill="#008cff">PACK-20</text><text x="772" y="1050" class="micro" fill="#7c2cff">COAST</text><text x="990" y="1012" class="micro" fill="#008cff">DETAIL</text>
    </g>
  
      <g transform="">
        <path d="M440 255 Q600 120 760 255 L820 860 Q600 942 380 860 Z" fill="#06070b" stroke="#1f2634" stroke-width="9" />
        <path d="M420 300 L245 640 L330 700 L438 495" fill="#07090e" stroke="#008cff" stroke-width="7" />
        <path d="M780 300 L955 640 L870 700 L762 495" fill="#07090e" stroke="#7c2cff" stroke-width="7" />
        <path d="M495 270 Q600 355 705 270 L690 420 Q600 485 510 420Z" fill="#090d15" stroke="#293345" stroke-width="7" />
        <path d="M600 345 V880" stroke="#008cff" stroke-width="9" />
        
        <path d="M410 555 Q600 645 790 555" fill="none" stroke="url(#slash)" stroke-width="22" opacity=".78" />
        <text x="600" y="548" text-anchor="middle" class="mark">WOLFPACK</text>
      </g>
  
    <g transform="translate(719.2 260) rotate(2.34)">
      <rect x="-146" y="-48" width="292" height="96" rx="10" fill="#030407" stroke="url(#slash)" stroke-width="4" opacity=".82"/>
      <g transform="translate(-106 0) scale(0.26)" opacity="1" filter="url(#softGlow)"><path d="M-96 20 C-58 -38 -12 -38 26 20 C48 54 76 54 98 18" fill="none" stroke="#008cff" stroke-width="15" stroke-linecap="round"/><path d="M-86 54 C-48 8 -18 8 18 54 C42 82 72 82 96 52" fill="none" stroke="#7c2cff" stroke-width="11" stroke-linecap="round"/></g>
      <text x="-28" y="-8" class="tiny" fill="#eef5ff">DETAIL VIEW</text>
      <text x="-28" y="28" class="tinyBlue">MATERIAL CALL 20</text>
    </g>
    <g transform="translate(600 926)">
      <rect x="-330" y="-48" width="660" height="72" rx="8" fill="#05070b" stroke="#263247" stroke-width="3" opacity=".88"/>
      <text x="0" y="-4" text-anchor="middle" class="tiny">BLACK SOFTSHELL JACKET WITH ...</text>
      <text x="0" y="28" text-anchor="middle" class="tinyBlue">WOLFPACK 4X4 / ROAM / ISSUE 20</text>
    </g>
  <g>
    <rect x="82" y="82" width="244" height="62" rx="8" fill="#05070b" stroke="#008cff" stroke-width="3" opacity=".95"/>
    <text x="204" y="122" text-anchor="middle" class="meta">DETAIL</text>
    <text x="600" y="1072" text-anchor="middle" class="name">SOFTSHELL TRAIL JACKET</text>
    <text x="600" y="1114" text-anchor="middle" class="meta">APPAREL - WOLFPACK 4X4</text>
