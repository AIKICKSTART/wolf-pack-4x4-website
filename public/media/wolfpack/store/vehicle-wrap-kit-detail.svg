<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">Wolfpack Wrap Kit DETAIL Wolfpack concept</title>
  <desc id="desc">Black, purple and blue graphics package for customer-owned 4x4s.</desc>
  <defs>
    <radialGradient id="stage" cx="50%" cy="42%" r="58%">
      <stop offset="0%" stop-color="#1e2638"/>
      <stop offset="48%" stop-color="#080b12"/>
      <stop offset="100%" stop-color="#030407"/>
    </radialGradient>
    <linearGradient id="fabric" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111724"/>
      <stop offset="45%" stop-color="#05070c"/>
      <stop offset="100%" stop-color="#151b29"/>
    </linearGradient>
    <linearGradient id="slash" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00b8ff"/>
      <stop offset="52%" stop-color="#202bff"/>
      <stop offset="100%" stop-color="#723cff"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#00b8ff" flood-opacity=".42"/>
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity=".46"/>
    </filter>
    <style>
      .mark{font-family:Arial Black,Impact,sans-serif;font-size:58px;letter-spacing:3px;fill:#eef5ff;paint-order:stroke;stroke:#020306;stroke-width:8px}
      .smallmark{font-family:Arial Black,Impact,sans-serif;font-size:35px;letter-spacing:5px;fill:#eef5ff;paint-order:stroke;stroke:#020306;stroke-width:5px}
      .meta{font-family:Consolas,Monaco,monospace;font-size:24px;letter-spacing:6px;fill:#aeb9cf}
      .name{font-family:Arial Black,Impact,sans-serif;font-size:34px;letter-spacing:1px;fill:#f3f6fb}
      .tiny{font-family:Arial Black,Impact,sans-serif;font-size:22px;letter-spacing:2px;fill:#edf5ff}
      .tinyBlue{font-family:Consolas,Monaco,monospace;font-size:18px;letter-spacing:4px;fill:#00b8ff}
      .micro{font-family:Consolas,Monaco,monospace;font-size:15px;letter-spacing:4px;font-weight:700}
    </style>
  </defs>
  <rect width="1200" height="1200" fill="url(#stage)"/>
  <circle cx="600" cy="610" r="410" fill="#00b8ff" opacity=".09" filter="url(#glow)"/>
  <circle cx="805" cy="360" r="210" fill="#723cff" opacity=".13" filter="url(#glow)"/>
  <path d="M132 942 C320 876 452 850 600 850 C748 850 880 876 1068 942" fill="none" stroke="url(#slash)" stroke-width="8" opacity=".52"/>
  
    <g opacity=".96">
      <circle cx="678" cy="560" r="160" fill="none" stroke="url(#slash)" stroke-width="5" opacity="0.24"/><circle cx="678" cy="560" r="242" fill="none" stroke="url(#slash)" stroke-width="5" opacity="0.215"/><circle cx="678" cy="560" r="324" fill="none" stroke="url(#slash)" stroke-width="5" opacity="0.19"/><circle cx="678" cy="560" r="406" fill="none" stroke="url(#slash)" stroke-width="5" opacity="0.16499999999999998"/><circle cx="678" cy="560" r="488" fill="none" stroke="url(#slash)" stroke-width="5" opacity="0.13999999999999999"/><circle cx="678" cy="560" r="570" fill="none" stroke="url(#slash)" stroke-width="5" opacity="0.11499999999999999"/>
      <g transform="translate(1020 235) scale(0.62)" opacity="0.34" filter="url(#softGlow)"><path d="M0 -86 C68 -20 84 42 28 84 C-34 118 -100 42 -34 -18 C-18 -34 -18 -62 0 -86Z" fill="#723cff" stroke="#00b8ff" stroke-width="8"/><path d="M0 -18 C32 18 32 50 2 66 C-28 48 -22 18 0 -18Z" fill="#05070c"/></g>
      <g transform="translate(184 830) scale(0.5)" opacity="0.26" filter="url(#softGlow)"><path d="M0 -86 C68 -20 84 42 28 84 C-34 118 -100 42 -34 -18 C-18 -34 -18 -62 0 -86Z" fill="#723cff" stroke="#00b8ff" stroke-width="8"/><path d="M0 -18 C32 18 32 50 2 66 C-28 48 -22 18 0 -18Z" fill="#05070c"/></g>
      <path d="M90 438 H1110" stroke="url(#slash)" stroke-width="6" opacity=".34"/>
      <text x="118" y="1012" class="micro" fill="#00b8ff">PERFORMANCE</text><text x="336" y="1050" class="micro" fill="#723cff">VISUAL PACKAGE</text><text x="554" y="1012" class="micro" fill="#00b8ff">PACK-82</text><text x="772" y="1050" class="micro" fill="#723cff">CAMP</text><text x="990" y="1012" class="micro" fill="#00b8ff">DETAIL</text>
    </g>
  
      <g transform="">
        <path d="M240 360 H960 L900 792 H300Z" fill="#05070c" stroke="#242b38" stroke-width="10"/>
        <path d="M300 450 C480 365 610 610 900 420" fill="none" stroke="url(#slash)" stroke-width="46" stroke-linecap="round"/>
        <path d="M330 610 C520 520 660 735 870 590" fill="none" stroke="#00b8ff" stroke-width="22" stroke-linecap="round"/>
        <path d="M365 742 H835" stroke="#723cff" stroke-width="18" stroke-linecap="round"/>
        <text x="600" y="680" text-anchor="middle" class="mark">WRAP</text>
      </g>
  
    <g transform="translate(731.8 260) rotate(3.42)">
      <rect x="-146" y="-48" width="292" height="96" rx="10" fill="#030407" stroke="url(#slash)" stroke-width="4" opacity=".82"/>
      <g transform="translate(-106 0) scale(0.26)" opacity="1" filter="url(#softGlow)"><path d="M0 -86 C68 -20 84 42 28 84 C-34 118 -100 42 -34 -18 C-18 -34 -18 -62 0 -86Z" fill="#723cff" stroke="#00b8ff" stroke-width="8"/><path d="M0 -18 C32 18 32 50 2 66 C-28 48 -22 18 0 -18Z" fill="#05070c"/></g>
      <text x="-28" y="-8" class="tiny" fill="#eef5ff">DETAIL VIEW</text>
      <text x="-28" y="28" class="tinyBlue">MATERIAL CALL 82</text>
    </g>
    <g transform="translate(600 926)">
      <rect x="-330" y="-48" width="660" height="72" rx="8" fill="#05070b" stroke="#263247" stroke-width="3" opacity=".88"/>
      <text x="0" y="-4" text-anchor="middle" class="tiny">ROLLED VINYL WRAP PANELS WIT...</text>
      <text x="0" y="28" text-anchor="middle" class="tinyBlue">WOLFPACK 4X4 / BASE / ISSUE 82</text>
    </g>
  <g>
    <rect x="82" y="82" width="244" height="62" rx="8" fill="#05070b" stroke="#00b8ff" stroke-width="3" opacity=".95"/>
    <text x="204" y="122" text-anchor="middle" class="meta">DETAIL</text>
    <text x="600" y="1072" text-anchor="middle" class="name">WOLFPACK WRAP KIT</text>
    <text x="600" y="1114" text-anchor="middle" class="meta">PERFORMANCE - WOLFPACK 4X4</text>
  </g>
</svg>
